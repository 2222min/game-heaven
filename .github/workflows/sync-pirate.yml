name: 해적왕 랜덤 디펜스 자동 동기화

# pirate-random-defense 레포의 최신 버전을 30분마다 가져와
# 변경이 있으면 커밋 → GitHub Pages 자동 재배포.
# 급할 때는 Actions 탭에서 "Run workflow"로 즉시 실행 가능.
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 원본 레포에서 최신 게임 가져오기
        run: curl -fsSL https://raw.githubusercontent.com/2222min/pirate-random-defense/main/index.html -o pirate/index.html

      - name: 변경 시 커밋 & 푸시
        run: |
          if git diff --quiet pirate/index.html; then
            echo "변경 없음 — 건너뜀"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add pirate/index.html
            git commit -m "chore: 해적왕 랜덤 디펜스 최신 버전 자동 동기화"
            git push
          fi
