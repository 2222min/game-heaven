<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0710">
<title>던전 서바이버즈 · DUNGEON SURVIVORS</title>
<style>
  :root{
    --bg:#0a0710; --panel:#16101f; --panel2:#1f1730; --ink:#f4ecff; --dim:#a99cc4;
    --gold:#ffcf5c; --blue:#7fd4ff; --green:#8bef9c; --red:#ff6b7a; --purple:#c08bff;
    --com:#8fa3bd; --unc:#5ad19a; --rare:#5aa9ff; --epic:#c58bff; --leg:#ffbf4d;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
  html,body{height:100%;background:var(--bg);color:var(--ink);position:fixed;width:100%;
    font-family:"Trebuchet MS","Segoe UI",system-ui,-apple-system,sans-serif;overflow:hidden;overscroll-behavior:none;touch-action:none}
  #game{position:fixed;inset:0;display:block;background:#07050c;image-rendering:pixelated;image-rendering:crisp-edges;touch-action:none}
  .layer{position:fixed;inset:0;pointer-events:none}
  .center{display:flex;align-items:center;justify-content:center;flex-direction:column}
  .pe{pointer-events:auto}
  /* mobile: allow taps/scroll but never pinch/double-tap zoom */
  .btn,.card,.lucard,.chip,#pausebtn,.muteb,.shopitem .buy,textarea{touch-action:manipulation}

  /* ---------- HUD ---------- */
  #hud{opacity:0;transition:opacity .3s;font-weight:bold}
  #hud.on{opacity:1}
  .topbar{position:absolute;top:0;left:0;right:0;padding:calc(env(safe-area-inset-top,0px) + 8px) 12px 8px;display:flex;flex-direction:column;gap:6px;
    background:linear-gradient(#000a,transparent)}
  .xpwrap{height:9px;border-radius:6px;background:#0006;box-shadow:inset 0 0 0 1px #ffffff22;overflow:hidden}
  .xpbar{height:100%;width:0;background:linear-gradient(90deg,#66e0ff,#39a7ff);box-shadow:0 0 8px #4bc5ffcc;transition:width .12s}
  .hudrow{display:flex;align-items:center;gap:10px;font-size:13px;text-shadow:0 2px 3px #000}
  .lvbadge{background:linear-gradient(#4a3aa8,#2c2170);padding:2px 9px;border-radius:8px;box-shadow:0 0 0 1px #ffffff33, 0 3px 6px #0007;font-size:13px}
  .timer{font-size:22px;letter-spacing:1px;text-shadow:0 0 12px #000,0 2px 3px #000;font-variant-numeric:tabular-nums}
  .stat{display:flex;align-items:center;gap:4px;font-size:13px}
  .spacer{flex:1}
  .hpwrap{height:15px;border-radius:8px;background:#0007;box-shadow:inset 0 0 0 1px #ffffff22;overflow:hidden;position:relative;max-width:340px}
  .hpbar{height:100%;width:100%;background:linear-gradient(90deg,#ff5a6e,#ff8a5a);box-shadow:0 0 10px #ff5a6eaa;transition:width .1s}
  .hptext{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;text-shadow:0 1px 2px #000}
  .wchips{position:absolute;left:8px;bottom:calc(env(safe-area-inset-bottom,0px) + 8px);display:flex;flex-wrap:wrap;gap:4px;max-width:60vw}
  .chip{width:34px;height:34px;border-radius:8px;background:#1a1330cc;box-shadow:inset 0 0 0 1px #ffffff26,0 3px 5px #0006;
    display:flex;align-items:center;justify-content:center;position:relative}
  .chip canvas{width:26px;height:26px;image-rendering:pixelated}
  .chip .lv{position:absolute;right:-3px;bottom:-4px;font-size:10px;background:#2a1f52;border-radius:6px;padding:0 4px;box-shadow:0 0 0 1px #ffffff33}
  #combo{position:absolute;top:calc(env(safe-area-inset-top,0px) + 100px);left:0;right:0;text-align:center;font-weight:800;
    color:#ffcf5c;text-shadow:0 0 14px #ff8a3a99,0 2px 3px #000;pointer-events:none;opacity:0;transition:opacity .25s;font-size:18px}
  #combo.on{opacity:1}
  #pausebtn{position:absolute;top:calc(env(safe-area-inset-top,0px) + 10px);right:10px;width:40px;height:40px;border-radius:10px;
    background:#1a1330cc;box-shadow:inset 0 0 0 1px #ffffff2b,0 3px 6px #0007;display:flex;align-items:center;justify-content:center;font-size:16px}

  /* ---------- Overlays ---------- */
  #overlay{background:radial-gradient(120% 90% at 50% 0%,#1a1030f2,#080510f7);display:none;overflow-y:auto;padding:24px 16px;touch-action:pan-y;-webkit-overflow-scrolling:touch;
    justify-content:flex-start} /* id beats .center — child margin:auto centers when it fits, scrolls when it overflows */
  #overlay.on{display:flex}
  .panel{width:min(560px,94vw);display:flex;flex-direction:column;align-items:center;gap:14px;margin:auto}
  .title{font-size:clamp(30px,8vw,54px);font-weight:800;letter-spacing:2px;line-height:1;text-align:center;
    background:linear-gradient(#fff,#ffcf5c 55%,#ff7a5a);-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 4px 10px #ff8a3a55);text-transform:uppercase}
  .subtitle{font-size:13px;letter-spacing:5px;color:var(--dim);text-transform:uppercase;margin-top:-6px}
  .tag{font-size:12px;color:var(--dim);text-align:center;line-height:1.6;max-width:440px}
  .btn{pointer-events:auto;cursor:pointer;border:none;font-family:inherit;font-weight:700;color:#fff;font-size:16px;letter-spacing:1px;
    padding:14px 26px;border-radius:14px;background:linear-gradient(#7a4bff,#5322c9);box-shadow:0 0 0 1px #ffffff33,0 6px 0 #3a1a8f,0 10px 18px #0007;
    transition:transform .06s, box-shadow .06s;min-width:200px;text-align:center}
  .btn:active{transform:translateY(4px);box-shadow:0 0 0 1px #ffffff33,0 2px 0 #3a1a8f,0 5px 10px #0007}
  .btn.gold{background:linear-gradient(#ffd45c,#f2a324);color:#3a2600;box-shadow:0 0 0 1px #fff5,0 6px 0 #a5670c,0 10px 18px #0007}
  .btn.gold:active{box-shadow:0 0 0 1px #fff5,0 2px 0 #a5670c}
  .btn.ghost{background:linear-gradient(#2a2140,#1c1530);box-shadow:0 0 0 1px #ffffff26,0 6px 0 #120c22,0 10px 18px #0006}
  .btn.ghost:active{box-shadow:0 0 0 1px #ffffff26,0 2px 0 #120c22}
  .btn.sm{font-size:13px;padding:10px 16px;min-width:0;border-radius:10px}
  .row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .goldpill{display:inline-flex;align-items:center;gap:6px;background:#1e1730;padding:6px 14px;border-radius:20px;box-shadow:inset 0 0 0 1px #ffffff22;
    font-size:15px;color:var(--gold)}
  .goldpill .c{width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff3c0,#f5b52a 60%,#a5670c);box-shadow:0 0 6px #ffcf5c88}
  h2.sec{font-size:15px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-top:4px}

  /* char select */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%}
  .card{position:relative;background:linear-gradient(#211934,#171025);border-radius:14px;box-shadow:inset 0 0 0 1px #ffffff1c,0 6px 14px #0006;
    padding:12px 8px 10px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:transform .08s, box-shadow .08s;pointer-events:auto;overflow:hidden}
  .card:active{transform:scale(.97)}
  .card.sel{box-shadow:inset 0 0 0 2px var(--gold),0 0 20px #ffcf5c55,0 6px 14px #0006}
  .card.lock{filter:saturate(.25) brightness(.65)}
  .card .pic{width:56px;height:56px;image-rendering:pixelated;margin-top:2px;filter:drop-shadow(0 3px 4px #000a)}
  .card .nm{font-size:13px;font-weight:700}
  .card .rl{font-size:10px;color:var(--dim);text-align:center;line-height:1.35;min-height:26px}
  .card .cost{font-size:12px;color:var(--gold);display:flex;align-items:center;gap:4px}
  .card .lockicon{position:absolute;top:8px;right:9px;font-size:14px;opacity:.85}

  /* levelup cards */
  #luwrap{width:min(680px,96vw);display:flex;flex-direction:column;gap:12px;align-items:center;margin:auto}
  .lucards{display:flex;flex-direction:column;gap:10px;width:100%}
  .lucard{pointer-events:auto;cursor:pointer;display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:14px;
    background:linear-gradient(100deg,#211934,#181126);box-shadow:inset 0 0 0 1px #ffffff18,0 5px 12px #0006;transition:transform .07s,box-shadow .07s;position:relative;overflow:hidden}
  .lucard:active{transform:scale(.985)}
  .lucard .ic{width:52px;height:52px;min-width:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;position:relative;box-shadow:inset 0 0 0 1px #ffffff20}
  .lucard .ic canvas{width:40px;height:40px;image-rendering:pixelated;filter:drop-shadow(0 2px 2px #0009)}
  .lucard .tx{flex:1;display:flex;flex-direction:column;gap:3px}
  .lucard .tn{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px}
  .lucard .td{font-size:12px;color:var(--dim);line-height:1.4}
  .lucard .badge{font-size:10px;font-weight:700;padding:1px 7px;border-radius:6px;letter-spacing:.5px}
  .pips{display:flex;gap:2px}
  .pip{width:7px;height:7px;border-radius:2px;background:#ffffff22}
  .pip.f{background:currentColor;box-shadow:0 0 5px currentColor}
  .lucard .side{font-size:10px;color:var(--dim);text-align:right;min-width:40px}
  .rr-com{--rc:var(--com)} .rr-unc{--rc:var(--unc)} .rr-rare{--rc:var(--rare)} .rr-epic{--rc:var(--epic)} .rr-leg{--rc:var(--leg)}
  .lucard{border-left:3px solid var(--rc,#888)}
  .lucard .ic{background:linear-gradient(#2a2142,#1a1430)}
  .badge{background:color-mix(in srgb,var(--rc) 30%,#0000);color:var(--rc);box-shadow:inset 0 0 0 1px var(--rc)}
  .lucard.kb{box-shadow:inset 0 0 0 2px var(--rc),0 0 16px color-mix(in srgb,var(--rc) 35%,#0000),0 5px 12px #0006;transform:translateX(4px)}
  .knum{position:absolute;right:9px;top:8px;font-size:10px;font-weight:700;color:var(--dim);background:#ffffff12;border-radius:5px;padding:1px 6px}
  @media (hover:none) and (pointer:coarse){.knum,.kbhint{display:none}}

  /* shop */
  .shoplist{display:flex;flex-direction:column;gap:8px;width:100%;max-height:52vh;overflow-y:auto;padding-right:4px}
  .shopitem{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:12px;background:linear-gradient(#1e1732,#161022);box-shadow:inset 0 0 0 1px #ffffff14}
  .shopitem .ic{width:40px;height:40px;min-width:40px;border-radius:10px;background:linear-gradient(#2a2142,#191330);display:flex;align-items:center;justify-content:center;box-shadow:inset 0 0 0 1px #ffffff1c}
  .shopitem .ic canvas{width:30px;height:30px;image-rendering:pixelated}
  .shopitem .info{flex:1}
  .shopitem .nm{font-size:13px;font-weight:700}
  .shopitem .ds{font-size:11px;color:var(--dim)}
  .shopitem .lvpips{display:flex;gap:3px;margin-top:3px}
  .shopitem .buy{pointer-events:auto;cursor:pointer;border:none;font-family:inherit;font-weight:700;color:#3a2600;font-size:12px;
    background:linear-gradient(#ffd45c,#f2a324);padding:8px 11px;border-radius:9px;box-shadow:0 3px 0 #a5670c;min-width:74px;text-align:center}
  .shopitem .buy:active{transform:translateY(2px);box-shadow:0 1px 0 #a5670c}
  .shopitem .buy.max{background:#2b2440;color:var(--dim);box-shadow:none;cursor:default}
  .shopitem .buy.no{filter:grayscale(.6) brightness(.8)}

  .fade{animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .pop{animation:pop .3s cubic-bezier(.2,1.4,.4,1)}
  @keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
  .toast{position:fixed;left:50%;top:64px;transform:translateX(-50%);background:#1e1730ee;padding:10px 18px;border-radius:12px;
    box-shadow:inset 0 0 0 1px #ffffff22,0 8px 20px #0008;font-size:13px;font-weight:700;opacity:0;transition:opacity .25s, top .25s;pointer-events:none;z-index:50;text-align:center}
  .toast.on{opacity:1;top:78px}
  .hint{font-size:11px;color:var(--dim);text-align:center;line-height:1.6}
  .kv{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;font-size:13px}
  .kv b{color:var(--gold)}
  .muteb{position:absolute;top:calc(env(safe-area-inset-top,0px) + 10px);left:10px;width:40px;height:40px;border-radius:10px;background:#1a1330cc;
    box-shadow:inset 0 0 0 1px #ffffff2b,0 3px 6px #0007;display:flex;align-items:center;justify-content:center;font-size:16px;pointer-events:auto;cursor:pointer;z-index:20}
  .loadscreen{position:fixed;inset:0;background:#0a0710;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:100}
</style>

<canvas id="game"></canvas>

<!-- HUD -->
<div id="hud" class="layer">
  <div class="topbar">
    <div class="hudrow">
      <span class="lvbadge">Lv <span id="hLv">1</span></span>
      <div class="xpwrap" style="flex:1"><div class="xpbar" id="hXp"></div></div>
      <span class="stat">💰<span id="hGold">0</span></span>
      <span class="stat">💀<span id="hKills">0</span></span>
    </div>
    <div class="hudrow center" style="flex-direction:row">
      <div class="spacer"></div><div class="timer" id="hTime">00:00</div><div class="spacer"></div>
    </div>
    <div class="hpwrap"><div class="hpbar" id="hHp"></div><div class="hptext" id="hHpTxt">100/100</div></div>
  </div>
  <div class="wchips" id="hWeapons"></div>
  <div id="combo"></div>
</div>
<div id="pausebtn" class="pe">⏸</div>

<!-- overlay for all menus -->
<div id="overlay" class="layer center"></div>
<div id="toast" class="toast"></div>

<div class="loadscreen" id="loadscreen">
  <div class="title" style="font-size:34px">던전 서바이버즈</div>
  <div class="subtitle">LOADING…</div>
</div>

function hexRgba(hex,a){hex=hex.replace('#','');if(hex.length===3)hex=hex.split('').map(c=>c+c).join('');
  const n=parseInt(hex,16);return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;}

/* ============================================================================
   ASSETS  — load sheet, prerender scaled + tinted + white-silhouette variants
   ============================================================================ */
const Assets = {
  ready:false, img:null,
  cache:new Map(),      // key -> canvas (colored/normal sprite at PRE scale)
  white:new Map(),      // key -> white silhouette
  PRE:4,                // prerender scale (16 -> 64)
  load(cb){
    const img=new Image();
    img.onload=()=>{ this.img=img; this.ready=true; cb(); };
    img.src="data:image/png;base64,"+SHEET_B64;
  },
  _base(tile){
    if(this.cache.has(tile))return this.cache.get(tile);
    const s=TILE*this.PRE, c=document.createElement('canvas');c.width=s;c.height=s;
    const g=c.getContext('2d');g.imageSmoothingEnabled=false;
    const col=tile%SHEET_COLS, row=(tile/SHEET_COLS)|0;
    g.drawImage(this.img,col*TILE,row*TILE,TILE,TILE,0,0,s,s);
    this.cache.set(tile,c);return c;
  },
  // tinted variant (multiply-ish color overlay preserving shading)
  tinted(tile,color,amt){
    const key=tile+'|'+color+'|'+amt;
    if(this.cache.has(key))return this.cache.get(key);
    const base=this._base(tile),s=base.width,c=document.createElement('canvas');c.width=s;c.height=s;
    const g=c.getContext('2d');g.imageSmoothingEnabled=false;
    g.drawImage(base,0,0);
    g.globalCompositeOperation='source-atop';
    g.globalAlpha=amt;g.fillStyle=color;g.fillRect(0,0,s,s);
    g.globalAlpha=1;g.globalCompositeOperation='source-over';
    this.cache.set(key,c);return c;
  },
  whiteOf(tile){
    if(this.white.has(tile))return this.white.get(tile);
    const base=this._base(tile),s=base.width,c=document.createElement('canvas');c.width=s;c.height=s;
    const g=c.getContext('2d');g.imageSmoothingEnabled=false;
    g.drawImage(base,0,0);g.globalCompositeOperation='source-atop';g.fillStyle='#fff';g.fillRect(0,0,s,s);
    this.white.set(tile,c);return c;
  },
  glow:new Map(),
  glowCanvas(color){
    if(this.glow.has(color))return this.glow.get(color);
    const s=128,c=document.createElement('canvas');c.width=s;c.height=s;
    const g=c.getContext('2d');
    const gr=g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
    gr.addColorStop(0,hexRgba(color,0.9));gr.addColorStop(0.35,hexRgba(color,0.5));
    gr.addColorStop(0.75,hexRgba(color,0.12));gr.addColorStop(1,hexRgba(color,0));
    g.fillStyle=gr;g.fillRect(0,0,s,s);
    this.glow.set(color,c);return c;
  }
};

/* small helper: make a mini canvas of a sprite for DOM icons */
function spriteIconCanvas(tile,size=40,tint,amt){
  const c=document.createElement('canvas');c.width=size;c.height=size;
  const g=c.getContext('2d');g.imageSmoothingEnabled=false;
  const src=tint?Assets.tinted(tile,tint,amt||0.5):Assets._base(tile);
  g.drawImage(src,0,0,size,size);
  return c;
}

/* ============================================================================
   SAVE (meta progression)
   ============================================================================ */
const SAVE_KEY='dungeonSurvivors_v1';
const DEFAULT_SAVE={gold:0,upg:{},unlocked:{mage:true},best:{time:0,kills:0},muted:false,tut:false,ach:{},nick:'',scores:[]};
/* 저장 데이터 스키마 방어: 오염/조작된 저장으로 렌더 크래시·NaN 전파 차단.
   얕은 Object.assign이 best.kills 등 중첩 키를 잃던 문제도 깊은 병합으로 수정 */
function sanitizeSave(s){
  const d=JSON.parse(JSON.stringify(DEFAULT_SAVE));
  if(!s||typeof s!=='object')return d;
  const num=(v,lo,hi)=>{v=Math.floor(Number(v));return Number.isFinite(v)?clamp(v,lo,hi):lo;}; // Infinity/NaN 차단
  d.gold=num(s.gold,0,99999999);
  if(s.upg&&typeof s.upg==='object')for(const k in s.upg){const it=SHOP.find(x=>x.id===k);if(it)d.upg[k]=num(s.upg[k],0,it.max);}
  if(s.unlocked&&typeof s.unlocked==='object')for(const k in s.unlocked){if(CHARS.find(c=>c.id===k))d.unlocked[k]=!!s.unlocked[k];}
  d.unlocked.mage=true;
  if(s.best&&typeof s.best==='object'){d.best.time=num(s.best.time,0,86400);d.best.kills=num(s.best.kills,0,9999999);}
  d.muted=!!s.muted;d.tut=!!s.tut;
  if(s.ach&&typeof s.ach==='object')for(const k in s.ach)if(ACHS.find(a=>a.id===k))d.ach[k]=!!s.ach[k];
  d.nick=String(s.nick||'').slice(0,12);
  if(Array.isArray(s.scores))d.scores=s.scores.slice(0,10).map(x=>({nick:String((x&&x.nick)||'용사').slice(0,12),
    time:num(x&&x.time,0,86400),kills:num(x&&x.kills,0,9999999),
    level:num(x&&x.level,0,999),char:String((x&&x.char)||'').slice(0,16),win:!!(x&&x.win),at:num(x&&x.at,0,4102444800000)}));
  return d;
}
let META=loadSave();
let STORAGE_OK=true;
/* 주의: 이 시점엔 SHOP/CHARS/ACHS가 TDZ라 sanitizeSave 불가 — boot()에서 META=sanitizeSave(META) 수행 */
function loadSave(){try{const s=JSON.parse(localStorage.getItem(SAVE_KEY));if(s&&s.upg)return Object.assign({},JSON.parse(JSON.stringify(DEFAULT_SAVE)),s);}catch(e){}return JSON.parse(JSON.stringify(DEFAULT_SAVE));}
function saveMeta(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(META));STORAGE_OK=true;}catch(e){STORAGE_OK=false;}}
function testStorage(){try{localStorage.setItem('__ds_t','1');localStorage.removeItem('__ds_t');STORAGE_OK=true;}catch(e){STORAGE_OK=false;}return STORAGE_OK;}

/* ============================================================================
   AUDIO — tiny procedural synth (WebAudio), muteable
   ============================================================================ */
const Sound={
  ctx:null,master:null,sfxBus:null,musicBus:null,noiseBuf:null,
  seqTimer:null,seqStep:0,nextT:0,mode:'ambient',
  init(){ if(this.ctx)return; try{
    const AC=window.AudioContext||window.webkitAudioContext; this.ctx=new AC();
    if(this.ctx.state==='suspended')this.ctx.resume();
    const comp=this.ctx.createDynamicsCompressor();
    comp.threshold.value=-18;comp.ratio.value=6;comp.attack.value=0.004;comp.release.value=0.18;
    this.master=this.ctx.createGain();this.master.gain.value=META.muted?0:1;
    this.sfxBus=this.ctx.createGain();this.sfxBus.gain.value=0.5;
    this.musicBus=this.ctx.createGain();this.musicBus.gain.value=0;
    this.sfxBus.connect(this.master);this.musicBus.connect(this.master);
    this.master.connect(comp);comp.connect(this.ctx.destination);
    const n=this.ctx.sampleRate;const buf=this.ctx.createBuffer(1,n,n);
    const d=buf.getChannelData(0);for(let i=0;i<n;i++)d[i]=Math.random()*2-1;
    this.noiseBuf=buf;
    this.nextT=this.ctx.currentTime+0.1;
    this.seqTimer=setInterval(()=>this._tickMusic(),90);
  }catch(e){} },
  set(){ if(this.master)this.master.gain.value=META.muted?0:1; },
  _t(){ return this.ctx.currentTime; },
  tone(o){ if(!this.ctx||META.muted)return; const t=o.at||this._t();
    const os=this.ctx.createOscillator(),g=this.ctx.createGain();
    os.type=o.type||'square';os.frequency.setValueAtTime(o.f0,t);
    if(o.f1)os.frequency.exponentialRampToValueAtTime(Math.max(20,o.f1),t+o.dur);
    g.gain.setValueAtTime(o.vol,t);g.gain.exponentialRampToValueAtTime(0.0008,t+o.dur);
    let head=os;
    if(o.filt){const f=this.ctx.createBiquadFilter();f.type='lowpass';f.frequency.value=o.filt;os.connect(f);head=f;}
    head.connect(g);g.connect(o.bus||this.sfxBus);
    os.start(t);os.stop(t+o.dur+0.05);
  },
  noise(o){ if(!this.ctx||META.muted)return; const t=o.at||this._t();
    const s=this.ctx.createBufferSource();s.buffer=this.noiseBuf;s.loop=true;
    const f=this.ctx.createBiquadFilter();f.type=o.type||'lowpass';
    f.frequency.setValueAtTime(o.f0||1200,t);
    if(o.f1)f.frequency.exponentialRampToValueAtTime(Math.max(40,o.f1),t+o.dur);
    f.Q.value=o.q||0.7;
    const g=this.ctx.createGain();g.gain.setValueAtTime(o.vol,t);g.gain.exponentialRampToValueAtTime(0.0008,t+o.dur);
    s.connect(f);f.connect(g);g.connect(o.bus||this.sfxBus);
    s.start(t);s.stop(t+o.dur+0.05);
  },
  /* ---- SFX: 노이즈 레이어 + 피치 랜덤으로 반복 피로 방지 ---- */
  shoot(){ this.tone({type:'square',f0:620+rand(-60,60),f1:260,dur:0.07,vol:0.05,filt:2400}); },
  hit(){ this.noise({dur:0.06,vol:0.10,f0:1400,f1:250}); this.tone({type:'square',f0:150+rand(-20,20),f1:85,dur:0.06,vol:0.07}); },
  crit(){ this.noise({dur:0.05,vol:0.09,f0:2600,f1:600}); this.tone({type:'square',f0:235+rand(-15,15),f1:130,dur:0.05,vol:0.06}); },
  pick(){ const f=pick([660,742,880,990,1175]); this.tone({type:'sine',f0:f,f1:f*1.35,dur:0.1,vol:0.09}); },
  coin(){ this.tone({type:'sine',f0:1320,f1:1650,dur:0.07,vol:0.08}); this.tone({type:'sine',f0:1980,dur:0.09,vol:0.05,at:this._t()+0.05}); },
  hurt(){ this.noise({dur:0.18,vol:0.28,f0:2400,f1:180}); this.tone({type:'sawtooth',f0:220,f1:60,dur:0.22,vol:0.20}); },
  levelup(){ const t=this._t(); [523,659,784,1046,1568].forEach((f,i)=>this.tone({type:'triangle',f0:f,dur:0.16,vol:0.16,at:t+i*0.07}));
    this.noise({dur:0.5,vol:0.05,f0:5200,f1:8000,at:t+0.1,type:'highpass'}); },
  boom(){ this.tone({type:'sine',f0:130,f1:34,dur:0.4,vol:0.42}); this.noise({dur:0.34,vol:0.24,f0:900,f1:70}); },
  boss(){ const t=this._t(); [0,0.16,0.32,0.5].forEach((d,i)=>this.tone({type:'sawtooth',f0:82-i*8,f1:41,dur:0.3,vol:0.2,at:t+d,filt:600}));
    this.noise({dur:0.9,vol:0.14,f0:300,f1:60}); },
  win(){ const t=this._t(); [523,659,784,1046,1318,1568].forEach((f,i)=>this.tone({type:'triangle',f0:f,dur:0.22,vol:0.18,at:t+i*0.11})); },
  die(){ const t=this._t(); [392,311,262,196,131].forEach((f,i)=>this.tone({type:'sawtooth',f0:f,f1:f*0.9,dur:0.3,vol:0.16,at:t+i*0.14,filt:900})); },
  /* ---- BGM: 32스텝 시퀀서 — 평상시 다크 앰비언트, 보스전 배틀 ---- */
  _tickMusic(){ if(!this.ctx)return;
    const st=G.state;
    const target=META.muted?0:(st==='playing'?0.17:(st==='levelup'||st==='paused'?0.07:0));
    this.musicBus.gain.setTargetAtTime(target,this._t(),0.5);
    const mode=(st==='playing'&&G.enemies.some(e=>e.boss))?'battle':'ambient'; // 보스 다중 생존 대응
    if(mode!==this.mode){this.mode=mode;this.seqStep=0;}
    if(this.nextT<this._t()-0.4)this.nextT=this._t()+0.05; // 탭 복귀 시 재동기화
    if(target<=0&&this.musicBus.gain.value<0.005)return;   // 무음이면 스케줄 스킵
    const spb=this.mode==='battle'?0.135:0.22;
    while(this.nextT<this._t()+0.28){ this._step(this.seqStep,this.mode,this.nextT); this.nextT+=spb; this.seqStep=(this.seqStep+1)%32; }
  },
  _step(s,mode,t){
    const B=this.musicBus;
    if(mode==='ambient'){ // Am 드론 + 성긴 펜타토닉 아르페지오
      if(s%8===0){ const root=[55,55,65.4,49][(s/8)|0];
        this.tone({type:'sawtooth',f0:root,dur:1.7,vol:0.16,at:t,bus:B,filt:220});
        this.tone({type:'sawtooth',f0:root*1.5,dur:1.7,vol:0.07,at:t,bus:B,filt:220}); }
      if(s%4===2&&Math.random()<0.4){ this.tone({type:'triangle',f0:pick([220,262,294,330,392,440]),dur:0.6,vol:0.05,at:t,bus:B}); }
      if(s===16)this.noise({dur:2.5,vol:0.012,f0:2000,f1:400,at:t,bus:B});
    } else { // 배틀: 킥+햇+베이스 리프
      if(s%4===0)this.tone({type:'sine',f0:140,f1:38,dur:0.13,vol:0.30,at:t,bus:B});
      if(s%4===2)this.noise({dur:0.035,vol:0.07,f0:6000,at:t,bus:B,type:'highpass'});
      const riff=[110,0,110,131,0,110,0,98, 110,0,110,147,0,131,0,123, 110,0,110,131,0,110,0,98, 165,0,147,0,131,0,123,0];
      if(riff[s])this.tone({type:'sawtooth',f0:riff[s],dur:0.12,vol:0.15,at:t,bus:B,filt:900});
      if(s===12||s===28)this.tone({type:'square',f0:440,f1:415,dur:0.2,vol:0.05,at:t,bus:B,filt:1600});
    }
  },
};

/* 밸런스 튜닝 콘솔 툴: dumpDPS() — 전 무기 이론 DPS (기본 스탯, 패시브 미적용) */
window.dumpDPS=function(){
  const HIT={ // 무기별 시전당 실효 히트 수(단일 대상 기준)·주기 근사
    bolt:lv=>({n:1+(lv>=3?1:0)+(lv>=6?1:0),cd:wStat(WEAPONS.bolt,'cd',lv)}),
    arrow:lv=>({n:1+(lv>=4?1:0)+(lv>=7?1:0),cd:wStat(WEAPONS.arrow,'cd',lv)}),
    axe:lv=>({n:1+Math.floor(lv/2),cd:wStat(WEAPONS.axe,'cd',lv)}),
    dagger:lv=>({n:2+Math.floor(lv/2),cd:wStat(WEAPONS.dagger,'cd',lv)}),
    fire:lv=>({n:(1+(lv>=5?1:0))*1.6,cd:wStat(WEAPONS.fire,'cd',lv)}), // onHit 폭발 0.6배 포함
    bolt2:lv=>({n:1.5,cd:wStat(WEAPONS.bolt2,'cd',lv)}), // 단일: 첫 체인 + 감전 도트 환산
    nova:lv=>({n:1.5,cd:wStat(WEAPONS.nova,'cd',lv)}),   // 밀착 보너스 포함
    boom:lv=>({n:2*(1+Math.floor(lv/3)),cd:wStat(WEAPONS.boom,'cd',lv)}), // 왕복 2타
    mine:lv=>({n:1+(lv>=3?1:0)+(lv>=6?1:0),cd:wStat(WEAPONS.mine,'cd',lv)}),
    whirl:lv=>({n:1,cd:0.35}),  // 접촉 히트쿨 기준(적 1기 통과 시)
    aura:lv=>({n:1,cd:Math.max(0.14,0.4-lv*0.02)}),
    spirit:lv=>({n:1+(lv>=4?1:0)+(lv>=7?1:0),cd:0.5}),
  };
  const rows=[];
  for(const id in WEAPONS){const d=WEAPONS[id];
    const dps=lv=>{const h=HIT[id](lv);return +(wStat(d,'dmg',lv)*h.n/h.cd).toFixed(1);};
    rows.push({id,name:d.name,lv1:dps(1),lv4:dps(4),lv8:dps(8)});}
  rows.sort((a,b)=>b.lv8-a.lv8);console.table(rows);return rows;
};

function evoCandidate(p){
  for(const w of p.weapons){ if(w.evo)continue; const ev=EVOS[w.id];
    if(ev && w.lv>=WEAPONS[w.id].max && (p.passives[ev.pass]||0)>0) return w; }
  return null;
}

const Input={
  keys:{}, mx:0,my:0,
  joy:{active:false,id:null,ox:0,oy:0,x:0,y:0,dx:0,dy:0},
  init(cv){
    addEventListener('keydown',e=>{ this.keys[e.key.toLowerCase()]=true;
      if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase()))e.preventDefault();
      // level-up cards: full keyboard control
      if(G.state==='levelup'&&G.luChoices){
        const k=e.key,n=G.luChoices.length;
        if(k>='1'&&k<='4'){const i=+k-1;if(i<n){e.preventDefault();chooseUpgrade(i);}return;}
        if(k==='ArrowUp'||k==='ArrowDown'||k==='w'||k==='s'){e.preventDefault();
          G.luSel=((G.luSel??0)+((k==='ArrowUp'||k==='w')?-1:1)+n)%n;UI.luHighlight();return;}
        if(k==='Enter'||k===' '){e.preventDefault();if(document.activeElement)document.activeElement.blur();chooseUpgrade(G.luSel??0);return;}
        if(k==='r'||k==='R'){e.preventDefault();rerollChoices();return;}
        return; // swallow other keys while picking (no pause toggle)
      }
      if(e.key===' '||e.key==='Escape')Game.togglePause();
    },{passive:false});
    addEventListener('keyup',e=>{this.keys[e.key.toLowerCase()]=false;});
    const start=(id,x,y)=>{ if(G.state!=='playing'||this.joy.active)return; this.joy.active=true;this.joy.id=id;this.joy.ox=x;this.joy.oy=y;this.joy.x=x;this.joy.y=y;this.joy.dx=0;this.joy.dy=0; };
    const move=(x,y)=>{ if(!this.joy.active)return; let dx=x-this.joy.ox,dy=y-this.joy.oy;const m=Math.hypot(dx,dy),mr=70;
      if(m>mr){ // follow-style: base chases the finger, knob rides the rim
        this.joy.ox=x-dx/m*mr; this.joy.oy=y-dy/m*mr; dx=dx/m*mr; dy=dy/m*mr; }
      this.joy.x=this.joy.ox+dx;this.joy.y=this.joy.oy+dy;
      const n=Math.hypot(dx,dy);this.joy.dx=n>6?dx/mr:0;this.joy.dy=n>6?dy/mr:0; };
    const end=()=>{ this.joy.active=false;this.joy.dx=0;this.joy.dy=0; };
    cv.addEventListener('touchstart',e=>{e.preventDefault();
      if(Sound.ctx&&Sound.ctx.state==='suspended')Sound.ctx.resume(); // iOS: 제스처로 오디오 재개
      const t=e.changedTouches[0];start(t.identifier,t.clientX,t.clientY);},{passive:false});
    cv.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches)if(t.identifier===this.joy.id)move(t.clientX,t.clientY);},{passive:false});
    cv.addEventListener('touchend',e=>{for(const t of e.changedTouches)if(t.identifier===this.joy.id)end();},{passive:false});
    cv.addEventListener('touchcancel',end,{passive:false});
    // mouse (desktop) optional drag-to-move
    cv.addEventListener('mousedown',e=>start('m',e.clientX,e.clientY));
    addEventListener('mousemove',e=>{this.mx=e.clientX;this.my=e.clientY;if(this.joy.id==='m')move(e.clientX,e.clientY);});
    addEventListener('mouseup',()=>{if(this.joy.id==='m')end();});
  },
  moveVec(){
    let x=0,y=0;
    if(this.keys['w']||this.keys['arrowup'])y-=1;
    if(this.keys['s']||this.keys['arrowdown'])y+=1;
    if(this.keys['a']||this.keys['arrowleft'])x-=1;
    if(this.keys['d']||this.keys['arrowright'])x+=1;
    if(x||y){const m=Math.hypot(x,y);return{x:x/m,y:y/m};}
    if(this.joy.active&&(this.joy.dx||this.joy.dy)){const m=Math.hypot(this.joy.dx,this.joy.dy)||1;return{x:this.joy.dx/m*Math.min(1,m),y:this.joy.dy/m*Math.min(1,m)};}
    return{x:0,y:0};
  }
};

const FX={
  parts:[], texts:[],
  spark(x,y,color,n=6,spd=120,life=0.5,size=3,glow=true){
    for(let i=0;i<n;i++){const a=rand(TAU),s=rand(spd*0.4,spd);
      this.parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,max:life,color,size:size*rand(0.7,1.3),g:0,glow,drag:0.9});}
  },
  blood(x,y,color='#ff5a6e',n=6){for(let i=0;i<n;i++){const a=rand(TAU),s=rand(40,150);
    this.parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-30,life:0.6,max:0.6,color,size:rand(2,4),g:260,glow:false,drag:0.92});}},
  ring(x,y,color,r0,r1,life=0.4){this.parts.push({ring:true,x,y,r:r0,r1,life,max:life,color});},
  smoke(x,y,color='#5a4a70',n=3){for(let i=0;i<n;i++){this.parts.push({x:x+rand(-6,6),y:y+rand(-6,6),vx:rand(-14,14),vy:rand(-30,-10),life:0.7,max:0.7,color,size:rand(4,7),g:-10,glow:false,drag:0.94});}},
  text(x,y,str,color='#fff',size=15,crit=false){this.texts.push({x:x+rand(-4,4),y,str,color,size:crit?size*1.5:size,life:crit?1.0:0.75,max:crit?1.0:0.75,vy:-48,crit});},
  update(dt){
    for(let i=this.parts.length-1;i>=0;i--){const p=this.parts[i];p.life-=dt;
      if(p.life<=0){swapRemove(this.parts,i);continue;}
      if(p.ring){p.r=lerp(p.r,p.r1,1-Math.pow(0.001,dt));continue;}
      p.vx*=Math.pow(p.drag,dt*60);p.vy*=Math.pow(p.drag,dt*60);p.vy+=p.g*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;
    }
    for(let i=this.texts.length-1;i>=0;i--){const t=this.texts[i];t.life-=dt;if(t.life<=0){swapRemove(this.texts,i);continue;}t.y+=t.vy*dt;t.vy*=Math.pow(0.9,dt*60);}
    if(this.parts.length>1200)this.parts.splice(0,this.parts.length-1200);
  }
};

/* ---------------- Player ---------------- */
function makePlayer(charId){
  const c=CHAR(charId), u=META.upg;
  const up=(k)=>u[k]||0;
  const p={
    char:c, x:0,y:0, vx:0,vy:0, r:13, face:{x:1,y:0},
    maxHp:0,hp:0, dmgMul:1, spdMul:1, cdMul:1, areaMul:1, projAdd:0, pickup:78,
    crit:0, armor:0, regen:0, moveSpd:150, level:1, xp:0, xpNeed:5,
    weapons:[], passives:{}, invuln:0, bob:0, moving:false, flip:false,
    magnetT:0, reroll:0, revives:0, dmgTakenMul:1, xpMul:1, goldMul:1, hurtFlash:0,
  };
  // 스탯 수치는 recomputeStats 단일 소스로 계산 (수동 중복 블록은 드리프트 원인이라 제거)
  p.xpMul=(1+0.10*up('xp'))*(c.id==='mage'?1.1:1);      // 대마법사: 비전 지능
  p.goldMul=1+0.10*up('gold');
  p.revives=up('revive');
  p.reroll=up('reroll');
  p.awaken=0;
  const startLv=up('startlv');
  recomputeStats(p);
  p.hp=p.maxHp;
  // starting weapon
  addWeapon(p,c.weapon);
  // apply start levels (meta): begin at a higher level with free upgrade picks
  p.level+=startLv;
  p.xp=0; p.xpNeed=xpForLevel(p.level);
  G.pendingLevels=startLv;
  return p;
}
function addWeapon(p,id){ if(p.weapons.find(w=>w.id===id))return; p.weapons.push({id,lv:1,cd:0,t:0}); }
function weaponLevel(p,id){const w=p.weapons.find(w=>w.id===id);return w?w.lv:0;}

/* recompute passive-derived stats from scratch (so re-applying is clean) */
function recomputeStats(p){
  const c=p.char,u=META.upg,up=k=>u[k]||0;
  p.maxHp=Math.round(c.hp*(1+0.12*up('hp')));
  p.dmgMul=c.dmg*(1+0.08*up('dmg'));
  p.spdMul=c.spd*(1+0.06*up('spd'));
  p.cdMul=Math.pow(0.95,up('cd'));
  p.areaMul=(c.area||1); if(!c.area)p.areaMul=1;
  p.projAdd=(c.proj||0)+up('proj');
  p.pickup=78*(1+0.15*up('mag'))*(c.id==='ranger'?1.25:1);
  p.armor=(c.armor||0)+up('armor');
  p.crit=(c.crit||0)+0.05*up('luck');
  p.regen=0;
  // passives
  for(const id in p.passives){const lv=p.passives[id];for(let i=0;i<lv;i++)PASSIVES[id].apply(p);}
  p.dmgMul*=Math.pow(1.03,p.awaken||0); // 전투 각성: 패시브 포함 전체에 승산 (가산 패시브에 희석 방지)
  p.moveSpd=136*p.spdMul;
  p.hp=Math.min(p.hp,p.maxHp);
}

function updateSpawns(dt){

  // normal spawns
  G.spawnT-=dt;
  const rate=Math.max(0.09,0.60-G.time*0.0006); // interval
  const per=1+Math.floor(G.time/70);
  if(G.spawnT<=0 && G.enemies.length<enemyBudget()+ (G.enemies.some(e=>e.boss)?60:0)){
    G.spawnT=rate;
    const pool=availableEnemies();
    const cluster=Math.random()<0.25? per*3 : per;
    // sometimes ring spawn
    if(G.time>45 && Math.random()<0.18){ const a0=rand(TAU),rad=Math.max(innerWidth,innerHeight)/CAM.scale*0.62;
      const cnt=Math.min(14,6+Math.floor(G.time/120));
      for(let i=0;i<cnt;i++){const a=a0+i/cnt*TAU;spawnEnemy(pick(pool),p.x+Math.cos(a)*rad,p.y+Math.sin(a)*rad);} }
    else for(let i=0;i<cluster;i++)spawnEnemy(pick(pool));
  }
  // elite occasionally
  G.difT-=dt;
  if(G.difT<=0){G.difT=rand(22,34); if(G.time>50){const el=spawnEnemy(pick(availableEnemies()),undefined,undefined,true);

  // 이벤트 웨이브

function availableEnemies(){
  const t=G.time,list=['bat'];
  if(t>25)list.push('spider');

  return list;
}

/* ============================================================================
   WEAPON FIRING
   ============================================================================ */
function nearestEnemy(x,y,max=99999){
  let best=null,bd=max*max;
  for(const e of G.enemies){const d=dist2(x,y,e.x,e.y);if(d<bd){bd=d;best=e;}}
  return best;
}
function critRoll(p){return Math.random()<p.crit;}
function wStat(def,key,lv){return def[key]?def[key][Math.min(lv-1,def[key].length-1)]:0;}

function fireWeapon(p,w){
  const def=WEAPONS[w.id],lv=w.lv;
  const dmgBase=wStat(def,'dmg',lv)*dmgMulOf(p)*(w.evo?2:1);
  const area=p.areaMul;
  const src=w.id;
  switch(w.id){
    case 'bolt':{
      let count=(1+(lv>=3?1:0)+(lv>=6?1:0)+p.projAdd)*(w.evo?2:1);
      const pierce=(lv>=4?1:0)+(lv>=7?1:0)+(w.evo?2:0);
      const targets=[];let t=nearestEnemy(p.x,p.y);
      for(let i=0;i<count;i++){
        const tgt=nearestEnemyExcluding(p.x,p.y,targets)||t;if(tgt)targets.push(tgt);
        let ang; if(tgt)ang=Math.atan2(tgt.y-p.y,tgt.x-p.x);else ang=Math.atan2(p.face.y,p.face.x)+rand(-0.3,0.3);
        const cr=critRoll(p);
        spawnProj({x:p.x,y:p.y,vx:Math.cos(ang)*420,vy:Math.sin(ang)*420,dmg:dmgBase*(cr?2:1),r:8*area,pierce,
          color:def.color,life:1.4,homing:tgt?(w.evo?7:3):0,trail:1,crit:cr,scale:area,knock:40,src});
      }
      Sound.shoot();break;}
    case 'arrow':{
      let count=1+(lv>=4?1:0)+(lv>=7?1:0)+p.projAdd+(w.evo?2:0);
      const pierce=2+(lv>=3?1:0)+(lv>=6?2:0)+(w.evo?3:0);
      const t=nearestEnemy(p.x,p.y);let base=t?Math.atan2(t.y-p.y,t.x-p.x):Math.atan2(p.face.y,p.face.x);
      const spread=count>1?0.22:0;
      for(let i=0;i<count;i++){const ang=base+(i-(count-1)/2)*spread;const cr=critRoll(p);
        spawnProj({x:p.x,y:p.y,vx:Math.cos(ang)*560,vy:Math.sin(ang)*560,dmg:dmgBase*(cr?2:1),r:7*area,pierce,
          color:def.color,life:1.1,tile:T.sword2,angle:ang,crit:cr,scale:area,knock:70,src});}
      Sound.shoot();break;}
    case 'axe':{
      let count=1+Math.floor(lv/2)+p.projAdd;
      for(let i=0;i<count;i++){const dir=(i%2?1:-1)*rand(60,150);const cr=critRoll(p);
        spawnProj({x:p.x,y:p.y,vx:dir,vy:-rand(300,420),dmg:dmgBase*(cr?2:1),r:(w.evo?26:16)*area,pierce:999,color:def.color,
          life:1.6,tile:T.axe,spin:14,grav:620,crit:cr,scale:(w.evo?1.9:1.1)*area,knock:90,impact:1.5,glow:false,src});}
      break;}
    case 'dagger':{
      let count=(2+Math.floor(lv/2)+p.projAdd)*(w.evo?2:1); // DPS 예산: Lv1 34→23 (자동조준 프리미엄 반영)
      const pierce=(lv>=4?1:0)+(lv>=7?1:0)+(w.evo?1:0);
      const t=nearestEnemy(p.x,p.y);let base=t?Math.atan2(t.y-p.y,t.x-p.x):Math.atan2(p.face.y,p.face.x);
      const spread=0.16;
      for(let i=0;i<count;i++){const ang=base+(i-(count-1)/2)*spread;const cr=critRoll(p);
        spawnProj({x:p.x,y:p.y,vx:Math.cos(ang)*520,vy:Math.sin(ang)*520,dmg:dmgBase*(cr?2:1),r:7*area,pierce,
          color:def.color,life:0.8,tile:T.dagger,angle:ang,crit:cr,scale:0.9*area,knock:45,src});}
      Sound.shoot();break;}
    case 'fire':{
      let count=1+(lv>=5?1:0)+Math.floor(p.projAdd/2);
      const t=nearestEnemy(p.x,p.y);let base=t?Math.atan2(t.y-p.y,t.x-p.x):Math.atan2(p.face.y,p.face.x);
      for(let i=0;i<count;i++){const ang=base+(count>1?(i-(count-1)/2)*0.3:0);const cr=critRoll(p);
        spawnProj({x:p.x,y:p.y,vx:Math.cos(ang)*260,vy:Math.sin(ang)*260,dmg:dmgBase*(cr?2:1),r:11*area,pierce:0,
          color:def.color,life:2.2,tile:T.staffRed,spin:6,crit:cr,scale:area,knock:60,trail:2,src,
          onHit:(px,py)=>explode(px,py,(48+lv*4)*area*(w.evo?1.6:1),dmgBase*0.6,def.color,false,0,src)});}
      break;}
    case 'bolt2':{
      let targets=(2+Math.floor(lv*0.7)+p.projAdd)*(w.evo?2:1); const chainR=(120+lv*8)*(w.evo?1.3:1);
      let from=p;let hit=new Set();let prev={x:p.x,y:p.y};let lastE=null;
      for(let i=0;i<targets;i++){
        const e=nearestEnemyExcludingSet(prev.x,prev.y,hit,chainR);if(!e)break;hit.add(e);
        const cr=critRoll(p);const dmg=dmgBase*(cr?2:1)*(1-i*0.06);
        damageEnemy(e,dmg,cr,{x:(e.x-prev.x),y:(e.y-prev.y)},'#e08bff',src,30);
        FX.spark(e.x,e.y,def.color,5,120,0.3,3);
        lightningBolt(prev.x,prev.y,e.x,e.y,def.color);
        prev={x:e.x,y:e.y};lastE=e;
      }
      // 감전: 마지막 체인 대상에 2초 도트 — 단일 대상(보스) 딜 정체성 부여
      if(lastE&&lastE.hp>0)lastE.shock={t:2,tick:dmgBase*0.25};
      Sound.hit();break;}
    case 'nova':{
      const r=(70+lv*10)*area*(w.evo?1.5:1); explode(p.x,p.y,r,dmgBase,def.color,true,(0.5+lv*0.05)*(w.evo?2:1),src);
      const nr=38*area,nr2=nr*nr; // 밀착 리스크 보상: 근접 적에게 +50% 추가타
      for(const e of [...G.enemies])if(dist2(p.x,p.y,e.x,e.y)<=nr2)damageEnemy(e,dmgBase*0.5,false,{x:e.x-p.x,y:e.y-p.y},def.color,src);
      FX.ring(p.x,p.y,def.color,10,r,0.5); G.shake=Math.max(G.shake,3);break;}
    case 'mine':{
      if(!w.mines)w.mines=[];
      const count=1+(lv>=3?1:0)+(lv>=6?1:0)+Math.floor(p.projAdd/2)+(w.evo?2:0);
      const maxMines=w.evo?14:9;
      for(let i=0;i<count;i++){ if(w.mines.length>=maxMines)break;
        const a=rand(TAU),d=rand(46,120);
        w.mines.push({x:p.x+Math.cos(a)*d,y:p.y+Math.sin(a)*d,arm:0.45,life:10,r:13,blink:rand(TAU)});
        FX.spark(p.x,p.y,def.color,2,60,0.25,2);}
      break;}
  }
}
function nearestEnemyExcluding(x,y,list){let best=null,bd=Infinity;for(const e of G.enemies){if(list.includes(e))continue;const d=dist2(x,y,e.x,e.y);if(d<bd){bd=d;best=e;}}return best;}
function nearestEnemyExcludingSet(x,y,set,max){let best=null,bd=max*max;for(const e of G.enemies){if(set.has(e))continue;const d=dist2(x,y,e.x,e.y);if(d<bd){bd=d;best=e;}}return best;}

function lightningBolt(x1,y1,x2,y2,color){
  const seg=6;let px=x1,py=y1;
  for(let i=1;i<=seg;i++){const t=i/seg;const nx=lerp(x1,x2,t)+rand(-10,10),ny=lerp(y1,y2,t)+rand(-10,10);
    FX.parts.push({x:px,y:py,vx:0,vy:0,life:0.18,max:0.18,color,size:2.5,g:0,glow:true,drag:1,line:{x:nx,y:ny}});px=nx;py=ny;}
}

function explode(x,y,r,dmg,color,slow,slowT,src){
  FX.ring(x,y,color,r*0.3,r,0.35);FX.spark(x,y,color,12,180,0.5,4);
  G.shake=Math.max(G.shake,4);Sound.boom();
  const r2=r*r;
  for(const e of [...G.enemies]){ if(dist2(x,y,e.x,e.y)<=r2+e.r*e.r){ // copy: kills mutate the list
    damageEnemy(e,dmg,false,{x:e.x-x,y:e.y-y},color,src); if(slow){e.slow=Math.max(e.slow,slowT||0.6);} } }
}

/* persistent weapons: whirl blades + aura — 판정과 렌더가 같은 레이아웃을 공유해야 함 */
function whirlLayout(w,p){const lv=w.lv;
  return {cnt:(1+Math.floor((lv+1)/2)+Math.floor(p.projAdd/2))*(w.evo?2:1),
          rad:(46+lv*3)*p.areaMul*(w.evo?1.2:1)};}
function updatePersistent(p,dt){
  const fz=p.frenzyT>0?0.87:1; // 프렌지 공속을 지속형 무기에도 동일 적용
  for(const w of p.weapons){
    if(w.id==='whirl'){
      const def=WEAPONS.whirl,lv=w.lv;const {cnt,rad}=whirlLayout(w,p);
      const speed=3.4/(p.cdMul*fz);w.t+=dt*speed; // 회전속도 상향 + 냉철/메타 공속 적용
      const dmg=wStat(def,'dmg',lv)*dmgMulOf(p)*(w.evo?2:1);const br=14*p.areaMul;
      for(let i=0;i<cnt;i++){const a=w.t+i/cnt*TAU;const bx=p.x+Math.cos(a)*rad,by=p.y+Math.sin(a)*rad;
        w._bx=bx;w._by=by;
        for(const e of G.enemies){ if(dist2(bx,by,e.x,e.y)<(br+e.r)*(br+e.r)){
          if(enemyHit(e,'whirl'+i,0.35)){const cr=critRoll(p);damageEnemy(e,dmg*(cr?2:1),cr,{x:e.x-p.x,y:e.y-p.y},def.color,'whirl',50);} } }
      }
    }
    else if(w.id==='aura'){
      const def=WEAPONS.aura,lv=w.lv;const rad=(52+lv*8)*p.areaMul*(w.evo?1.4:1);const dmg=wStat(def,'dmg',lv)*dmgMulOf(p)*(w.evo?2:1);
      w.t+=dt;const tick=Math.max(0.14,(0.4-lv*0.02)*p.cdMul*fz);
      if(w.t>=tick){w.t=0;const r2=rad*rad;
        for(const e of G.enemies){if(dist2(p.x,p.y,e.x,e.y)<=r2+e.r*e.r){const cr=critRoll(p);
          damageEnemy(e,dmg*(cr?2:1),cr,{x:e.x-p.x,y:e.y-p.y},def.color,'aura');
          const m=Math.hypot(e.x-p.x,e.y-p.y)||1;const kb=55*(e.boss?0.12:e.elite?0.35:1)/(1+G.time/360);e.knock.x+=(e.x-p.x)/m*kb;e.knock.y+=(e.y-p.y)/m*kb;}}
      }
      w._rad=rad;
    }
    else if(w.id==='spirit'){
      const def=WEAPONS.spirit,lv=w.lv;
      const cnt=(1+(lv>=4?1:0)+(lv>=7?1:0)+Math.floor(p.projAdd/2))*(w.evo?2:1);
      if(!w.pets)w.pets=[];
      while(w.pets.length<cnt)w.pets.push({x:p.x+rand(-24,24),y:p.y+rand(-24,24),vx:0,vy:0,bob:rand(TAU)});
      while(w.pets.length>cnt)w.pets.pop();
      const dmg=wStat(def,'dmg',lv)*dmgMulOf(p)*(w.evo?2:1);
      const acc=w.evo?1600:1000, maxSp=w.evo?360:265;
      for(let i=0;i<w.pets.length;i++){const pet=w.pets[i];pet.bob+=dt*9;
        let tgt=nearestEnemy(pet.x,pet.y,430);
        if(!tgt||dist2(pet.x,pet.y,p.x,p.y)>540*540)tgt=p; // 너무 멀면 귀환
        const dx=tgt.x-pet.x,dy=tgt.y-pet.y,m=Math.hypot(dx,dy)||1;
        pet.vx+=dx/m*acc*dt;pet.vy+=dy/m*acc*dt;
        const sp=Math.hypot(pet.vx,pet.vy);if(sp>maxSp){pet.vx*=maxSp/sp;pet.vy*=maxSp/sp;}
        pet.x+=pet.vx*dt;pet.y+=pet.vy*dt;
        for(const e of G.enemies){const rr=(12+e.r)*(12+e.r);
          if(dist2(pet.x,pet.y,e.x,e.y)<rr&&enemyHit(e,'sp'+i,0.5*p.cdMul*fz)){const cr=critRoll(p);
            damageEnemy(e,dmg*(cr?2:1),cr,{x:e.x-pet.x,y:e.y-pet.y},def.color,'spirit',40);
            FX.spark(pet.x,pet.y,def.color,3,90,0.25,2.5);}}
      }
    }
    else if(w.id==='mine'&&w.mines){
      const def=WEAPONS.mine,lv=w.lv;
      const dmg=wStat(def,'dmg',lv)*dmgMulOf(p)*(w.evo?2:1);
      const rad=(58+lv*5)*p.areaMul*(w.evo?1.5:1);
      for(let i=w.mines.length-1;i>=0;i--){const mn=w.mines[i];
        if(mn.arm>0){mn.arm-=dt;continue;}
        mn.life-=dt;mn.blink+=dt*7;
        if(mn.life<=0){FX.smoke(mn.x,mn.y,def.color,3);swapRemove(w.mines,i);continue;}
        for(const e of G.enemies){ if(dist2(mn.x,mn.y,e.x,e.y)<(mn.r+e.r)*(mn.r+e.r)){
          explode(mn.x,mn.y,rad,dmg,def.color,false,0,'mine'); // explode가 사운드·셰이크 포함
          swapRemove(w.mines,i);break;}}
      }
    }
    else if(w.id==='boom'){
      // handled as timed spawner below (cd), but projectiles curve back
    }
  }
}
function enemyHit(e,key,cd){const t=e.hcd[key]||0;if(G.time>=t){e.hcd[key]=G.time+cd;return true;}return false;}

/* ============================================================================
   DAMAGE
   ============================================================================ */
function damageEnemy(e,dmg,crit,dir,color,src,knock){
  dmg=Math.max(1,Math.round(dmg));
  e.hp-=dmg;e.flash=0.12;
  if(src)G.dmgStats[src]=(G.dmgStats[src]||0)+dmg;
  // 무기별 넉백(knock) 반영: 도끼 직격=크게 밀림, 단검=잔잔한 연타 — resist grows over time
  if(dir){const m=Math.hypot(dir.x,dir.y)||1;
    const k=(knock||34)*(e.boss?0.18:(e.elite?0.5:1))/(1+G.time/360)*(crit?1.5:1);
    e.knock.x+=dir.x/m*k;e.knock.y+=dir.y/m*k;}
  if(crit&&G.time>=(G.critFxT||0)){ // 크리 punctuation (0.2s 내부쿨로 남발 방지)
    G.critFxT=G.time+0.2;G.hitstop=Math.max(G.hitstop,0.004);G.shake=Math.max(G.shake,2);Sound.crit();}
  FX.text(e.x,e.y-e.r,String(dmg),crit?'#ffd45c':'#ffffff',crit?16:13,crit);
  if(color)FX.spark(e.x,e.y,color,crit?7:3,110,0.3,crit?4:2.5);
  if(e.hp<=0)killEnemy(e);
}
function killEnemy(e){
  const idx=G.enemies.indexOf(e);if(idx<0)return;
  FX.blood(e.x,e.y,e.tint||'#ff5a6e',e.boss?24:(e.elite?12:6));
  if(e.elite){FX.ring(e.x,e.y,e.tint||'#ffcf5c',6,e.r*2.5,0.4);G.shake=Math.max(G.shake,e.boss?9:4);
    G.hitstop=Math.max(G.hitstop,e.boss?0.11:0.045);} // 손맛: 히트스톱
  // 어픽스: 분열 — 소형 4마리로 쪼개짐
  if(e.affix==='split'&&!e.boss){for(let i=0;i<4;i++){const s=spawnEnemy(e.type,e.x+rand(-14,14),e.y+rand(-14,14));
    s.scale*=0.65;s.r*=0.7;s.hp=s.maxHp=s.maxHp*0.22;s.xp=1;s.goldDrop=0;}}
  // 어픽스: 폭발 — 공정성 계약: 치명 피해는 최소 0.6s 텔레그래프 (즉발 → 지연 폭발 존)
  if(e.affix==='burst'){FX.ring(e.x,e.y,'#ff5a5a',8,40,0.3);
    spawnZone({x:e.x,y:e.y,r:95,warn:0.6,dur:0.25,dmg:e.dmg*1.2,color:'#ff5a5a',burst:true});}
  // drops
  dropGems(e.x,e.y,e.xp);
  if(e.final){ // 마왕: 승리 즉시 종료라 픽업이 증발 — 골드 직접 가산
    const g=Math.round(e.goldDrop*G.player.goldMul);G.goldRun+=g;FX.text(e.x,e.y-20,'+'+g+'G','#ffcf5c',18,true);
  } else if(e.goldDrop>0)for(let i=0;i<e.goldDrop;i++)G.pickups.push(makePickup(e.x+rand(-10,10),e.y+rand(-10,10),'gold'));
  if(e.flee)G.pickups.push(makePickup(e.x,e.y,'magnet')); // 보물 고블린 보너스
  if(e.boss){
    G.pickups.push(makePickup(e.x,e.y,'chest'));
    if(e.final){G.wonBoss=true;}
    G.bossActive=(G.bossActive===e)?null:G.bossActive;
    Sound.boom();
    unlockAch('boss1'); if(e.type==='reaper')unlockAch('reaper');
  } else if(Math.random()<0.012)G.pickups.push(makePickup(e.x,e.y,'heart'));
  else if(Math.random()<0.006)G.pickups.push(makePickup(e.x,e.y,'magnet'));
  else if(Math.random()<0.004)G.pickups.push(makePickup(e.x,e.y,'bomb'));
  swapRemove(G.enemies,idx);
  G.kills++;
  if(G.kills>=100)unlockAch('k100');
  // 손맛: 킬 콤보 — 후반 EHP 인플레로 창이 상시 끊기지 않게 시간 비례 완화
  G.combo++;G.comboT=1.3+Math.min(0.7,G.time/600);if(G.combo>G.comboBest)G.comboBest=G.combo;
  if(G.combo%25===0){G.goldRun+=2;FX.text(e.x,e.y-14,'콤보 +2G','#ffcf5c',12);}
  if(G.combo===50||G.combo===100||G.combo===200){ // 프렌지: 밀집 지대로 파고들 이유
    const p=G.player;p.frenzyT=3;UI.toast('🔥 콤보 '+G.combo+' — 프렌지! 공속·이속 상승');Sound.pick();
    FX.ring(p.x,p.y,'#ff9a5a',10,140,0.5);}
  Sound.hit();
  if(e.final)winGame();
}
function dropGems(x,y,xp){
  // 후반 XP 스케일: 적 EHP 인플레에 맞춰 젬 가치 상승 — 9~14분 정체 완화.
  // max(1,…)로 초중반(d<5.8, ~5분)엔 미발동 — '첫 판 클리어 불가' 메타 게이팅 보존
  let left=Math.round(xp*Math.max(1,0.4+0.25*Math.sqrt(difficulty())));
  const tiers=[[25,'#ff6bd6'],[5,'#8bef9c'],[1,'#6fc4ff']];
  for(const[val,col]of tiers){while(left>=val){left-=val;
    if(G.gems.length>=800){ // 캡 도달 시 버리지 않고 기존 젬에 병합 (XP 보존)
      const g=G.gems[(Math.random()*G.gems.length)|0];g.val+=left+val;if(g.val>=25)g.color='#ff6bd6';return;}
    G.gems.push({x:x+rand(-8,8),y:y+rand(-8,8),val,color:col,vx:rand(-40,40),vy:rand(-60,-20),pull:false,bob:rand(TAU)});}}
}
function makePickup(x,y,kind){return {x,y,kind,vy:rand(-70,-30),vx:rand(-30,30),bob:rand(TAU),t:0};}

/* ============================================================================
   PLAYER UPDATE
   ============================================================================ */
function updatePlayer(p,dt){
  const mv=Input.moveVec();
  p.moving=!!(mv.x||mv.y);
  if(p.moving){p.face.x=mv.x;p.face.y=mv.y;if(Math.abs(mv.x)>0.05)p.flip=mv.x<0;}
  if(p.frenzyT>0)p.frenzyT-=dt;
  const fMove=p.frenzyT>0?1.1:1; // 프렌지: 이속 +10%
  p.x+=mv.x*p.moveSpd*fMove*dt;p.y+=mv.y*p.moveSpd*fMove*dt;
  p.bob+=dt*(p.moving?11:4);
  if(p.invuln>0)p.invuln-=dt;
  if(p.hurtFlash>0)p.hurtFlash-=dt;
  if(p.regen>0&&p.hp<p.maxHp){p.hp=Math.min(p.maxHp,p.hp+p.regen*dt);}
  if(p.magnetT>0){p.magnetT-=dt;}
  // weapons cd
  for(const w of p.weapons){
    if(w.id==='whirl'||w.id==='aura'||w.id==='spirit')continue;
    const def=WEAPONS[w.id];
    let cd=(def.cd?wStat(def,'cd',w.lv):1.0)*p.cdMul*(p.frenzyT>0?0.87:1); // 프렌지: 공속 +15%
    w.cd-=dt;
    if(w.id==='boom'){ if(w.cd<=0){w.cd=cd; fireBoomerang(p,w);} continue; }
    if(w.cd<=0){w.cd=cd;fireWeapon(p,w);}
  }
  updatePersistent(p,dt);
}
function fireBoomerang(p,w){
  const def=WEAPONS.boom,lv=w.lv;const count=1+Math.floor(lv/3)+Math.floor(p.projAdd/2);
  const dmg=wStat(def,'dmg',lv)*dmgMulOf(p)*(w.evo?2:1);const range=(140+lv*14)*p.areaMul;
  const t=nearestEnemy(p.x,p.y);let base=t?Math.atan2(t.y-p.y,t.x-p.x):Math.atan2(p.face.y,p.face.x);
  for(let i=0;i<count;i++){const ang=base+(i-(count-1)/2)*0.4;const cr=critRoll(p);
    spawnProj({x:p.x,y:p.y,vx:Math.cos(ang)*430,vy:Math.sin(ang)*430,dmg:dmg*(cr?2:1),r:(w.evo?19:12)*p.areaMul,pierce:999,
      color:def.color,life:2.4,tile:T.axe2,spin:18,crit:cr,scale:(w.evo?1.7:1)*p.areaMul,knock:50,glow:false,
      kind:'boomerang',boomRange:range,boomT:0,ownerX:0,ownerY:0,hitCd:{},src:'boom'});}
}

/* ============================================================================
   ENEMY UPDATE
   ============================================================================ */
function updateEnemies(p,dt){
  for(let i=G.enemies.length-1;i>=0;i--){
    const e=G.enemies[i];
    if(e.flash>0)e.flash-=dt;
    if(e.shock){e.shock.t-=dt; // 연쇄 번개 감전 도트
      if(e.shock.t<=0)e.shock=null;
      else if(enemyHit(e,'shock',0.5)){damageEnemy(e,e.shock.tick,false,null,'#e08bff','bolt2');
        if(!G.enemies.includes(e))continue;}}
    let sp=e.spd;if(e.slow>0){e.slow-=dt;sp*=(e.elite||e.boss)?0.85:0.65;} // CC-resist: slow is weaker, elites barely care
    const aiLock=e.boss?bossAI(e,p,dt):false; // 보스: 시전·돌진 중엔 추격 정지
    const dx=p.x-e.x,dy=p.y-e.y,m=Math.hypot(dx,dy)||1;
    const dirMul=e.flee?-1:1; // 보물 고블린은 도망간다
    e.x+=(aiLock?0:dx/m*sp*dt*dirMul) + e.knock.x*dt;
    e.y+=(aiLock?0:dy/m*sp*dt*dirMul) + e.knock.y*dt;
    e.knock.x*=Math.pow(0.02,dt);e.knock.y*=Math.pow(0.02,dt);
    e.bob+=dt*8; if(Math.abs(dx)>1)e.flip=(dx<0)!==e.flee;
    if(e.flee){ e.ttl-=dt; if(e.ttl<=0){FX.smoke(e.x,e.y,'#ffd45c',6);swapRemove(G.enemies,i);continue;} continue; } // 접촉딜 없음
    // contact damage
    e.atkCd-=dt;
    const rr=(e.r+p.r)*(e.r+p.r);
    if(dist2(p.x,p.y,e.x,e.y)<rr && e.atkCd<=0 && p.invuln<=0){
      hurtPlayer(p,e.dmg,e);e.atkCd=0.6;
    }
  }
}
function hurtPlayer(p,dmg,srcE){
  // 도적 특성: 그림자 회피
  if(p.char.id==='rogue'&&Math.random()<0.15){FX.text(p.x,p.y-p.r-4,'회피!','#8bef9c',13);return;}
  dmg=Math.max(1,dmg-p.armor);
  p.hitLog=(p.hitLog||[]).filter(t=>G.time-t<1);p.hitLog.push(G.time);
  p.hp-=dmg;p.invuln=p.hitLog.length>=3?0.25:0.15;p.hurtFlash=0.3; // short i-frame: swarms stay lethal, 다중 포위 1초 용해만 완화
  FX.text(p.x,p.y-p.r-4,'-'+Math.round(dmg),'#ff6b7a',14);
  G.shake=Math.max(G.shake,4);Sound.hurt();
  // 기사 특성: 가시 갑옷 — 접촉 피해 50% 반사
  if(p.char.id==='knight'&&srcE&&srcE.hp>0)damageEnemy(srcE,Math.max(1,Math.round(dmg*0.5)),false,{x:srcE.x-p.x,y:srcE.y-p.y},'#c9d4e6','thorns');
  // 서리마녀 특성: 서리 갑옷 — 피격 시 주변 둔화
  if(p.char.id==='sorc'){const r2=120*120;for(const e of G.enemies)if(dist2(p.x,p.y,e.x,e.y)<=r2)e.slow=Math.max(e.slow,1.2);
    FX.ring(p.x,p.y,'#8be9ff',10,120,0.4);}
  if(p.hp<=0)tryDie(p);
}
function tryDie(p){
  if(p.revives>0){p.revives--;p.hp=p.maxHp*0.6;p.invuln=2;FX.ring(p.x,p.y,'#ffcf5c',10,160,0.7);
    explode(p.x,p.y,220,80,'#ffcf5c');UI.toast('✨ 부활!');return;}
  loseGame();
}

/* ============================================================================
   PROJECTILE UPDATE
   ============================================================================ */
function updateProjectiles(dt){
  const p=G.player;
  for(let i=G.projs.length-1;i>=0;i--){
    const pr=G.projs[i];pr.life-=dt;
    if(pr.life<=0){ if(pr.onHit&&pr.kind==='bullet')pr.onHit(pr.x,pr.y); swapRemove(G.projs,i);continue; }
    if(pr.kind==='boomerang'){
      pr.boomT+=dt;
      // curve back toward player after half life
      const back=Math.atan2(p.y-pr.y,p.x-pr.x);
      const outPhase=pr.boomT<pr.life*0.4;
      if(!outPhase){if(!pr._returning){pr._returning=true;if(pr.hitSet)pr.hitSet.clear();} // return pass hits again
        const cur=Math.atan2(pr.vy,pr.vx);const na=cur+ (angDiff(cur,back))*Math.min(1,dt*3.5);
        const sp=Math.hypot(pr.vx,pr.vy);pr.vx=Math.cos(na)*sp;pr.vy=Math.sin(na)*sp;}
      pr.angle=(pr.angle||0)+pr.spin*dt;
    } else if(pr.homing>0){
      const t=nearestEnemy(pr.x,pr.y,260);
      if(t){const want=Math.atan2(t.y-pr.y,t.x-pr.x);const cur=Math.atan2(pr.vy,pr.vx);
        const na=cur+angDiff(cur,want)*Math.min(1,dt*pr.homing);const sp=Math.hypot(pr.vx,pr.vy);
        pr.vx=Math.cos(na)*sp;pr.vy=Math.sin(na)*sp;}
    }
    if(pr.grav)pr.vy+=pr.grav*dt;
    if(pr.spin)pr.angle=(pr.angle||0)+pr.spin*dt; else if(!pr.tile){}
    pr.x+=pr.vx*dt;pr.y+=pr.vy*dt;
    if(pr.trail){FX.parts.push({x:pr.x,y:pr.y,vx:0,vy:0,life:0.25,max:0.25,color:pr.color,size:pr.r*0.6,g:0,glow:true,drag:1});}
    // collision
    if(!pr.hitSet)pr.hitSet=new Set();
    for(const e of G.enemies){
      if(pr.hitSet.has(e.uid))continue;
      const rr=(pr.r+e.r)*(pr.r+e.r);
      if(dist2(pr.x,pr.y,e.x,e.y)<=rr){
        damageEnemy(e,pr.dmg,pr.crit,{x:pr.vx,y:pr.vy},pr.color,pr.src,pr.knock);
        if(pr.impact)G.shake=Math.max(G.shake,pr.impact); // 중병기 착탄 무게감
        pr.hitSet.add(e.uid);
        if(pr.onHit)pr.onHit(pr.x,pr.y);
        if(pr.kind!=='boomerang'&&pr.pierce<999){ if(pr.pierce<=0){swapRemove(G.projs,i);break;} pr.pierce--; }
      }
    }
  }
}
function angDiff(a,b){let d=(b-a)%TAU;if(d>Math.PI)d-=TAU;if(d<-Math.PI)d+=TAU;return d;}

/* ============================================================================
   ENEMY PROJECTILES · TELEGRAPH ZONES · BOSS AI
   ============================================================================ */
function spawnEProj(o){ o.angle=o.angle!==undefined?o.angle:Math.atan2(o.vy,o.vx); G.eprojs.push(o); return o; }
function updateEProjs(dt){
  const p=G.player;if(!p)return;
  for(let i=G.eprojs.length-1;i>=0;i--){const pr=G.eprojs[i];
    if(pr.delay>0){pr.delay-=dt;continue;}
    pr.life-=dt; if(pr.life<=0){swapRemove(G.eprojs,i);continue;}
    if(pr.kind==='ring'){ // 확장 충격파 — gap 방향으로 회피
      pr.r+=pr.grow*dt;
      if(!pr.hitP&&p.invuln<=0){const d=Math.hypot(p.x-pr.x,p.y-pr.y);
        if(Math.abs(d-pr.r)<pr.band+p.r){const pa=Math.atan2(p.y-pr.y,p.x-pr.x);
          if(Math.abs(angDiff(pr.gapA,pa))>pr.gapW/2){pr.hitP=true;hurtPlayer(p,pr.dmg);}}}
      if(pr.r>pr.maxR)swapRemove(G.eprojs,i);
      continue; }
    pr.x+=pr.vx*dt;pr.y+=pr.vy*dt;
    if(pr.spin)pr.angle+=pr.spin*dt;
    if(p.invuln<=0&&dist2(pr.x,pr.y,p.x,p.y)<(pr.r+p.r)*(pr.r+p.r)){
      hurtPlayer(p,pr.dmg);FX.spark(pr.x,pr.y,pr.color,5,100,0.3,3);swapRemove(G.eprojs,i);}
  }
}
function spawnZone(o){ o.t=0;o.hitT=0;o.tick=o.tick||0.5;o.live=false;G.zones.push(o);return o; }
function updateZones(dt){
  const p=G.player;if(!p)return;
  for(let i=G.zones.length-1;i>=0;i--){const z=G.zones[i];
    z.t+=dt;
    if(z.t<z.warn)continue; // 경고 표시 중
    if(!z.live){z.live=true;FX.ring(z.x,z.y,z.color,8,z.r,0.4);
      if(z.burst){G.shake=Math.max(G.shake,5);Sound.boom();FX.spark(z.x,z.y,z.color,14,180,0.5,4);}}
    if(z.t>=z.warn+z.dur){swapRemove(G.zones,i);continue;}
    if(p.invuln<=0&&G.time>=z.hitT&&dist2(p.x,p.y,z.x,z.y)<z.r*z.r){
      z.hitT=G.time+z.tick; hurtPlayer(p,z.dmg); }
  }
}

/* ---- 보스 상태머신: 시전 중 정지 → 텔레그래프 → 발동 ---- */
function bossAI(e,p,dt){
  if(!e.ai)e.ai={t:2.5,cast:0,mode:null,step:0,chan:0,ang:rand(TAU),tx:1,ty:0,dash:0,dashLen:0};
  const ai=e.ai;
  if(ai.dash>0){ // 돌진 실행
    ai.dash-=dt; e.x+=ai.tx*ai.dashSp*dt; e.y+=ai.ty*ai.dashSp*dt;
    FX.parts.push({x:e.x+rand(-10,10),y:e.y+rand(-10,10),vx:0,vy:0,life:0.3,max:0.3,color:e.tint||'#ff8a5a',size:5,g:0,glow:true,drag:1});
    return true; }
  if(ai.chan>0){ // 채널링: 회전 나선 탄막
    ai.chan-=dt; ai.acc-=dt;
    if(ai.acc<=0){ ai.acc=ai.rate; const arms=ai.arms||1;
      for(let k=0;k<arms;k++){const a=ai.ang+k*TAU/arms;
        spawnEProj({x:e.x,y:e.y,vx:Math.cos(a)*ai.psp,vy:Math.sin(a)*ai.psp,r:7,dmg:e.dmg*0.55,life:3.2,color:e.tint||'#ff5a5a'});}
      ai.ang+=ai.turn; }
    if(ai.chan<=0)ai.t=2.8;
    return true; }
  if(ai.cast>0){ ai.cast-=dt; if(ai.cast<=0)execBossSkill(e,p); return true; }
  ai.t-=dt; if(ai.t<=0)pickBossSkill(e,p);
  return false;
}
function pickBossSkill(e,p){
  const ai=e.ai;ai.step++;
  const aim=()=>{const dx=p.x-e.x,dy=p.y-e.y,m=Math.hypot(dx,dy)||1;ai.tx=dx/m;ai.ty=dy/m;};
  switch(e.type){
    case 'mimic':
      if(ai.step%2){ aim();const base=Math.atan2(ai.ty,ai.tx); // 동전 부채꼴
        for(let i=0;i<5;i++){const a=base+(i-2)*0.24;
          spawnEProj({x:e.x,y:e.y,vx:Math.cos(a)*175,vy:Math.sin(a)*175,r:7,dmg:e.dmg*0.6,life:2.6,color:'#ffd45c'});}
        Sound.coin();ai.t=3.0;
      } else { aim();ai.mode='dash';ai.cast=0.9;ai.dashLen=300;ai.dashSp=430; }
      break;
    case 'brood':
      if(ai.step%2){ const n=randi(6,8); // 새끼 소환
        for(let i=0;i<n;i++){const a=i/n*TAU;const s=spawnEnemy('spider',e.x+Math.cos(a)*44,e.y+Math.sin(a)*44);s.xp=1;s.goldDrop=0;}
        FX.ring(e.x,e.y,e.tint||'#b05aff',8,90,0.5);UI.toast('🕷 거미 여왕이 새끼를 부른다!');ai.t=4.2;
      } else { for(let i=0;i<3;i++)spawnZone({x:p.x+rand(-140,140),y:p.y+rand(-140,140),r:56,warn:1.0,dur:8,dmg:e.dmg*0.45,color:'#8bff5a'});
        ai.t=4.5; }
      break;
    case 'reaper':{
      const m3=ai.step%3;
      if(m3===1){ FX.smoke(e.x,e.y,'#7fd4ff',10);const a=rand(TAU),dd=rand(125,175); // 순간이동
        e.x=p.x+Math.cos(a)*dd;e.y=p.y+Math.sin(a)*dd;FX.smoke(e.x,e.y,'#7fd4ff',10);Sound.hit();ai.t=1.4;
      } else if(m3===2){ const base=Math.atan2(p.y-e.y,p.x-e.x); // 낫 부채꼴
        for(let i=0;i<7;i++){const a=base+(i-3)*0.21;
          spawnEProj({x:e.x,y:e.y,vx:Math.cos(a)*150,vy:Math.sin(a)*150,r:9,dmg:e.dmg*0.65,life:3.0,color:'#a4c8ff',tile:T.scim,spin:9});}
        ai.t=3.0;
      } else { spawnZone({x:p.x,y:p.y,r:74,warn:0.9,dur:0.25,dmg:e.dmg*1.1,color:'#7fd4ff',burst:true});ai.t=3.4; }
      break;}
    case 'overlord':
      if(ai.step%3===0){ for(let i=0;i<2;i++)spawnEnemy(pick(availableEnemies()),e.x+rand(-60,60),e.y+rand(-60,60),true);
        UI.toast('⚔ 심연의 군주가 정예를 소환!');ai.t=5.0;
      } else { let ga=rand(TAU); // 연속 링의 gap을 체이닝 — 기하적으로 항상 통과 가능하게
        for(let i=0;i<3;i++){spawnEProj({kind:'ring',x:e.x,y:e.y,r:24,grow:190,maxR:360,band:13,
          dmg:e.dmg*0.8,life:4,delay:i*0.5,gapA:ga,gapW:1.15,color:'#ff9a5a'});ga+=rand(-0.9,0.9);}
        Sound.boom();G.shake=Math.max(G.shake,4);ai.t=5.2; }
      break;
    case 'demon':{
      if(e.hp<e.maxHp*0.5&&!ai.enraged){ai.enraged=true;UI.toast('🔥 마왕 격노!');G.shake=Math.max(G.shake,8);Sound.boss();}
      const ph2=!!ai.enraged, m3=ai.step%3;
      if(m3===0){ aim();ai.mode='dash';ai.cast=0.85;ai.dashLen=340;ai.dashSp=470; }
      else if(m3===1){ ai.chan=ph2?2.0:1.6;ai.rate=ph2?0.075:0.10;ai.acc=0;ai.psp=ph2?165:145;ai.turn=0.5;ai.arms=ph2?2:1; }
      else { if(ph2){ const pts=[]; // 장판 간 최소 90px 이격 — 겹침 배치로 탈출로가 없어지는 시드 제거
          for(let i=0;i<3;i++){let zx,zy,ok=false;
            for(let tr=0;tr<5&&!ok;tr++){zx=p.x+rand(-110,110);zy=p.y+rand(-110,110);ok=pts.every(q=>dist2(q.x,q.y,zx,zy)>=90*90);}
            pts.push({x:zx,y:zy});spawnZone({x:zx,y:zy,r:66,warn:0.85,dur:0.25,dmg:e.dmg*0.9,color:'#ff4d5a',burst:true});}
          for(let i=0;i<3;i++)spawnEnemy('wraith',e.x+rand(-50,50),e.y+rand(-50,50)); }
        else spawnZone({x:p.x,y:p.y,r:80,warn:0.9,dur:0.25,dmg:e.dmg*0.9,color:'#ff4d5a',burst:true});
        ai.t=2.6; }
      break;}
  }
}
function execBossSkill(e,p){
  const ai=e.ai;
  if(ai.mode==='dash'){ ai.dash=ai.dashLen/ai.dashSp; ai.mode=null; ai.t=e.type==='demon'?2.4:3.2;
    Sound.boom();G.shake=Math.max(G.shake,5); }
}

/* ============================================================================
   GEMS & PICKUPS
   ============================================================================ */
function updateGems(dt){
  const p=G.player,pr2=p.pickup*p.pickup;
  for(let i=G.gems.length-1;i>=0;i--){
    const g=G.gems[i];g.bob+=dt*6;
    const d=dist2(p.x,p.y,g.x,g.y);
    if(g.pull||d<pr2||p.magnetT>0){g.pull=true;
      const dx=p.x-g.x,dy=p.y-g.y,m=Math.hypot(dx,dy)||1;const sp=Math.min(560,120+ (p.magnetT>0?600:340));
      g.x+=dx/m*sp*dt;g.y+=dy/m*sp*dt;
      if(d<(p.r+6)*(p.r+6)){gainXp(p,g.val);FX.spark(g.x,g.y,g.color,3,80,0.25,2);Sound.pick();swapRemove(G.gems,i);continue;}
    } else { g.vx*=Math.pow(0.02,dt);g.vy*=Math.pow(0.02,dt);g.x+=g.vx*dt;g.y+=g.vy*dt; }
  }
  for(let i=G.pickups.length-1;i>=0;i--){
    const k=G.pickups[i];k.t+=dt;k.vy+=200*dt;k.vy*=Math.pow(0.1,dt);k.x+=k.vx*dt;k.vx*=Math.pow(0.1,dt);k.bob+=dt*5;
    const rng=k.kind==='gold'?p.pickup:p.r+18;
    const d=dist2(p.x,p.y,k.x,k.y);
    if(k.kind==='gold'&&(d<p.pickup*p.pickup||p.magnetT>0)){const dx=p.x-k.x,dy=p.y-k.y,m=Math.hypot(dx,dy)||1;k.x+=dx/m*380*dt;k.y+=dy/m*380*dt;}
    if(d<(p.r+14)*(p.r+14)){ collectPickup(p,k); swapRemove(G.pickups,i); }
  }
}
function collectPickup(p,k){
  switch(k.kind){
    case 'gold':{ // 부동소수 누적: 탐욕 1~4렙이 round 계단에 먹히던 버그 수정 + 코인 가치 난이도 연동
      const base=(1+Math.floor(difficulty()/8)+(Math.random()<0.2?1:0))*p.goldMul;
      G.goldF=(G.goldF||0)+base;const g=Math.floor(G.goldF);G.goldF-=g;
      G.goldRun+=g;FX.text(k.x,k.y,'+'+g+'G','#ffcf5c',13);Sound.coin();break;}
    case 'heart':{p.hp=Math.min(p.maxHp,p.hp+p.maxHp*0.3);FX.text(p.x,p.y-p.r,'+HP','#8bef9c',15);FX.spark(k.x,k.y,'#8bef9c',10,120,0.4,3);Sound.pick();break;}
    case 'magnet':{p.magnetT=2.5;UI.toast('🧲 자석!');Sound.pick();break;}
    case 'bomb':{FX.ring(p.x,p.y,'#ffce54',10,Math.max(innerWidth,innerHeight),0.5);G.shake=12;Sound.boom();
      for(const e of [...G.enemies])if(!e.boss)damageEnemy(e,e.maxHp,false,null,'#ffce54','bomb');else damageEnemy(e,e.maxHp*0.12,false,null,'#ffce54','bomb');
      UI.toast('💥 폭탄!');break;}
    case 'chest':{openChest(p);break;}
  }
}
function openChest(p){
  // 진화 후보가 있으면 최우선으로 각성
  const evw=evoCandidate(p);
  if(evw){ evw.evo=true; const ev=EVOS[evw.id];
    FX.ring(p.x,p.y,'#ffcf5c',10,260,0.8); FX.spark(p.x,p.y,'#ffcf5c',24,220,0.8,4);
    G.shake=Math.max(G.shake,8); Sound.levelup();
    UI.toast('⚡ 무기 진화! 「'+ev.name+'」 — '+ev.desc); UI.buildChips();
    unlockAch('evolve');
    return; }
  // grant 1-3 upgrades instantly (보유 항목만); maxed build gets awaken stacks instead
  const n=randi(1,3);let got=[];
  for(let i=0;i<n;i++){const opt=rollOneUpgrade(p,true);if(opt){applyChoice(p,opt);got.push(opt.title);}}
  if(!got.length){p.awaken=(p.awaken||0)+2;recomputeStats(p);p.hp=p.maxHp;got.push('⚔ 전투 각성 +2 · 완전 회복');}
  FX.ring(p.x,p.y,'#ffcf5c',10,180,0.6);Sound.levelup();
  UI.toast('🎁 보물상자! '+got.join(', '));
}

/* ============================================================================
   XP / LEVEL UP
   ============================================================================ */
function xpForLevel(lv){return Math.floor(5+lv*4+lv*lv*0.7);}
function gainXp(p,v){
  p.xp+=v*p.xpMul;
  let leveled=0;
  while(p.xp>=p.xpNeed){p.xp-=p.xpNeed;p.level++;p.xpNeed=xpForLevel(p.level);leveled++;}
  if(p.level>=30)unlockAch('lv30');
  if(leveled>0)openLevelUp(leveled);
}
function buildUpgradePool(p,exclude){
  const pool=[];
  for(const w of p.weapons){const def=WEAPONS[w.id];if(w.lv<def.max)pool.push({kind:'wup',id:w.id,lv:w.lv+1,def,rar:rarByLevel(w.lv+1)});}
  if(p.weapons.length<MAX_WEAPONS){for(const id in WEAPONS){if(!p.weapons.find(w=>w.id===id))pool.push({kind:'wnew',id,def:WEAPONS[id],rar:'unc'});}}
  for(const id in PASSIVES){const lv=p.passives[id]||0;const def=PASSIVES[id];
    if(lv<def.max){ if(lv===0&&Object.keys(p.passives).length>=MAX_PASSIVES)continue; pool.push({kind:'pup',id,lv:lv+1,def,rar:rarByLevel(lv+1)});}}
  return pool.filter(o=>!exclude||!exclude.has(o.kind+o.id));
}
function rarByLevel(lv){return lv<=2?'com':lv<=4?'unc':lv<=6?'rare':lv<=7?'epic':'leg';}
function rollOneUpgrade(p,ownedOnly){let pool=buildUpgradePool(p);
  if(ownedOnly)pool=pool.filter(o=>o.kind==='wup'||(o.kind==='pup'&&(p.passives[o.id]||0)>0)); // 보스 상자: 빌드 오염 방지 — 보유 항목만 강화
  if(!pool.length)return null;return toChoice(pick(pool));}
function toChoice(o){
  if(o.kind==='wup')return{type:'wup',id:o.id,title:o.def.name,sub:'Lv.'+(o.lv-1)+' → Lv.'+o.lv,desc:o.def.desc(o.lv-1),icon:o.def.icon,color:o.def.color,rar:o.rar,lv:o.lv,max:o.def.max};
  if(o.kind==='wnew')return{type:'wnew',id:o.id,title:o.def.name,sub:'신규 무기',desc:o.def.desc(0),icon:o.def.icon,color:o.def.color,rar:'unc',lv:1,max:o.def.max};
  if(o.kind==='pup')return{type:'pup',id:o.id,title:o.def.name,sub:'Lv.'+(o.lv-1)+' → Lv.'+o.lv,desc:o.def.desc,icon:o.def.icon,color:o.def.color,rar:o.rar,lv:o.lv,max:o.def.max};
}
function openLevelUp(times){
  G.pendingLevels=(times||1);
  G.state='levelup';Sound.levelup();
  if(navigator.vibrate)navigator.vibrate(30);
  presentChoices();
}
function presentChoices(){
  const p=G.player;const pool=buildUpgradePool(p);
  // choose 4 distinct weighted by rarity + luck
  const nChoices=Math.min(4,Math.max(3,pool.length? (pool.length>=4?4:pool.length):1));
  const chosen=[];const seen=new Set();
  const weight={com:1,unc:0.8,rare:0.55,epic:0.32,leg:0.16};
  const luckBoost=1+p.crit*0.6;
  let guard=0;
  while(chosen.length<nChoices && pool.length && guard++<200){
    // weighted pick
    let tot=0;for(const o of pool){if(seen.has(o.kind+o.id))continue;tot+=(weight[o.rar]||0.5)*(o.rar!=='com'?luckBoost:1);}
    if(tot<=0)break;let r=Math.random()*tot;let selp=null;
    for(const o of pool){if(seen.has(o.kind+o.id))continue;r-=(weight[o.rar]||0.5)*(o.rar!=='com'?luckBoost:1);if(r<=0){selp=o;break;}}
    if(!selp)break;seen.add(selp.kind+selp.id);chosen.push(toChoice(selp));
  }
  if(chosen.length===0){ // 빌드 완성 후에도 성장 루프 유지: 회복 대신 영구 각성 스택
    chosen.push({type:'awaken',title:'전투 각성',sub:'한계 돌파 '+((p.awaken||0)+1),desc:'모든 피해 +3% (영구) · 체력 20% 회복',icon:T.hammer,color:'#ff9a5a',rar:'epic',lv:0,max:0});
  }
  G.luChoices=chosen;
  UI.levelUp(chosen);
}
function chooseUpgrade(idx){
  const p=G.player,c=G.luChoices[idx];
  applyChoice(p,c);
  G.pendingLevels--;
  if(G.pendingLevels>0){presentChoices();}
  else{G.state='playing';UI.overlay(false);UI.buildChips();}
}
function applyChoice(p,c){
  if(c.type==='wnew'){addWeapon(p,c.id);}
  else if(c.type==='wup'){const w=p.weapons.find(w=>w.id===c.id);if(w)w.lv=c.lv;}
  else if(c.type==='pup'){p.passives[c.id]=c.lv;recomputeStats(p);}
  else if(c.type==='awaken'){p.awaken=(p.awaken||0)+1;recomputeStats(p);p.hp=Math.min(p.maxHp,p.hp+p.maxHp*0.2);}
  else if(c.type==='heal'){p.hp=Math.min(p.maxHp,p.hp+p.maxHp*0.4);}
  FX.ring(p.x,p.y,c.color||'#fff',8,120,0.4);
}
function rerollChoices(){ if(G.player.reroll<=0)return; G.player.reroll--; presentChoices(); }
function skipChoice(){ G.player.hp=Math.min(G.player.maxHp,G.player.hp+G.player.maxHp*0.15);G.goldRun+=3;
  G.pendingLevels--; if(G.pendingLevels>0)presentChoices(); else{G.state='playing';UI.overlay(false);UI.buildChips();} }

function unlockAch(id){ if(!META.ach)META.ach={}; if(META.ach[id])return;
  const a=ACHS.find(a=>a.id===id); if(!a)return;
  META.ach[id]=true; META.gold+=a.gold; saveMeta();
  UI.toast('🏆 업적 달성: '+a.name+' (+'+a.gold+'G)'); Sound.levelup(); }

/* ---- 점수 기록 (로컬 + 서버 시도) ---- */
function submitScore(win){
  const s={nick:(META.nick||'용사').slice(0,12),time:Math.round(G.time),kills:G.kills,
    level:G.player.level,char:G.player.char.name,win:!!win,at:Date.now()};
  META.scores=(META.scores||[]);META.scores.push(s);
  META.scores.sort((a,b)=>(b.win-a.win)||(b.time-a.time)||(b.kills-a.kills)||(b.level-a.level));META.scores=META.scores.slice(0,10); // 승자 840초 동률 변별
  saveMeta();
  try{ fetch('/ds/scores',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(s)}).catch(()=>{}); }catch(e){}
}
function endRun(){
  // 정산 보너스 하향 + 필드 드랍 상향: 총수입 근사 유지, '주우러 움직이는' 골드 비중 ~30%로
  const bonus=Math.floor(G.time/10)+Math.floor(G.kills*0.7);
  const total=G.goldRun+Math.floor(bonus*G.player.goldMul);
  META.gold+=total;
  if(G.time>META.best.time)META.best.time=G.time;
  if(G.kills>META.best.kills)META.best.kills=G.kills;
  saveMeta();
  submitScore(G.state==='victory'||G.wonBoss);
  return {run:G.goldRun,bonus:Math.floor(bonus*G.player.goldMul),total};
}
function loseGame(){ if(G.state==='gameover'||G.state==='victory')return; G.state='gameover';
  const r=endRun();Sound.die();UI.gameOver(false,r); }
function winGame(){ if(G.state==='victory')return; G.state='victory';
  unlockAch('clear');
  const r=endRun();Sound.win();UI.gameOver(true,r); }

const CAM={scale:1};
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
let DPR=1;
function resize(){
  DPR=Math.min(2,window.devicePixelRatio||1);
  canvas.width=Math.floor(innerWidth*DPR);canvas.height=Math.floor(innerHeight*DPR);
  canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';
  CAM.scale=clamp(Math.min(innerWidth,innerHeight)/470,0.72,1.55);
}
addEventListener('resize',resize);

/* ============================================================================
   RENDER
   ============================================================================ */
function draw(){
  const w=canvas.width,h=canvas.height;
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,w,h);
  const p=G.player;
  const sc=CAM.scale*DPR;
  let shx=0,shy=0;
  if(G.shake>0){shx=rand(-G.shake,G.shake)*DPR;shy=rand(-G.shake,G.shake)*DPR;}
  const camx=(p?G.cam.x:0),camy=(p?G.cam.y:0);
  ctx.setTransform(sc,0,0,sc,w/2+shx,h/2+shy);
  ctx.translate(-camx,-camy);
  ctx.imageSmoothingEnabled=false;

  drawGround(camx,camy,sc,w,h);
  if(p){
    // world entities
    drawZones();
    drawGems();
    drawPickups();
    drawEnemies();
    drawPlayer(p);
    drawProjectiles();
    drawEProjs();
    drawParticles();
    drawWeaponAuras(p);
    drawFloatingText();
    drawJoystick();
  }
  // atmospheric vignette (screen space)
  ctx.setTransform(1,0,0,1,0,0);
  const vg=ctx.createRadialGradient(w/2,h/2,Math.min(w,h)*0.32,w/2,h/2,Math.max(w,h)*0.75);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(5,3,12,0.62)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,w,h);
}
function view(sc,w,h){ // world-space visible rect
  const halfW=(w/2)/sc, halfH=(h/2)/sc;
  return {x0:G.cam.x-halfW-40,y0:G.cam.y-halfH-40,x1:G.cam.x+halfW+40,y1:G.cam.y+halfH+40};
}
function drawGround(camx,camy,sc,w,h){
  // dark stone floor with grid + ambient vignette; parallax-free tiling
  const size=64;const v=view(sc,w,h);
  const x0=Math.floor(v.x0/size)*size, y0=Math.floor(v.y0/size)*size;
  for(let x=x0;x<v.x1;x+=size)for(let y=y0;y<v.y1;y+=size){
    const n=((Math.sin(x*0.021+y*0.017)*43758.5)%1+1)%1;
    const shade=8+ (n*10|0);
    ctx.fillStyle=`rgb(${14+shade},${10+shade},${18+shade})`;
    ctx.fillRect(x,y,size,size);
  }
  // subtle grid lines
  ctx.strokeStyle='rgba(255,255,255,0.028)';ctx.lineWidth=1/sc;
  ctx.beginPath();
  for(let x=x0;x<v.x1;x+=size){ctx.moveTo(x,v.y0);ctx.lineTo(x,v.y1);}
  for(let y=y0;y<v.y1;y+=size){ctx.moveTo(v.x0,y);ctx.lineTo(v.x1,y);}
  ctx.stroke();
  // scattered decor dots
  for(let x=x0;x<v.x1;x+=size)for(let y=y0;y<v.y1;y+=size){
    const n=((Math.sin(x*0.13+y*0.07)*12543.7)%1+1)%1;
    if(n>0.86){ctx.fillStyle='rgba(120,110,150,0.10)';const s=3+ (n*6|0);ctx.fillRect(x+size*0.5,y+size*0.5,s,s);}
  }
  // 던전 데코: 잔해·술통·깜빡이는 횃불 (셀 해시 고정 배치)
  for(let x=x0;x<v.x1;x+=size)for(let y=y0;y<v.y1;y+=size){
    const h=((Math.sin(x*0.37+y*0.53)*96811.3)%1+1)%1;
    if(h<=0.955)continue;
    const cx=x+size*0.5+((h*997)%1-0.5)*22, cy=y+size*0.5+((h*571)%1-0.5)*22;
    if(h>0.992){ // 횃불 + 흔들리는 불빛
      ctx.globalCompositeOperation='lighter';ctx.globalAlpha=0.30+Math.sin(G.time*6+x*0.7)*0.10;
      ctx.drawImage(Assets.glowCanvas('#ff9a4d'),cx-26,cy-26,52,52);
      ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
      drawSprite(Assets._base(T.torch),cx,cy,17,false,0,0.9);
    } else if(h>0.975){ ctx.globalAlpha=0.5;drawSprite(Assets._base(T.barrel),cx,cy,16,false,0,0.5);ctx.globalAlpha=1; }
    else { drawSprite(Assets._base(h>0.965?24:12),cx,cy,15,false,0,0.30); }
  }
}
function sprScale(){return CAM.scale;}
function drawSprite(cv,wx,wy,drawW,flip,angle,alpha){
  ctx.save();ctx.translate(wx,wy);if(angle)ctx.rotate(angle);if(flip)ctx.scale(-1,1);
  if(alpha!==undefined)ctx.globalAlpha=alpha;
  ctx.drawImage(cv,-drawW/2,-drawW/2,drawW,drawW);ctx.restore();
}
function shadow(x,y,r){ctx.save();ctx.globalAlpha=0.35;ctx.fillStyle='#000';ctx.beginPath();
  ctx.ellipse(x,y,r*0.9,r*0.42,0,0,TAU);ctx.fill();ctx.restore();}

function drawPlayer(p){
  const base=32; const hop=p.moving?Math.abs(Math.sin(p.bob))*4:Math.sin(p.bob)*1.5;
  shadow(p.x,p.y+13,p.r);
  // aura glow
  ctx.globalCompositeOperation='lighter';
  ctx.globalAlpha=0.5+Math.sin(p.bob*0.5)*0.06;
  const gc=Assets.glowCanvas(p.char.id==='sorc'?'#8be9ff':p.char.id==='mage'?'#7fb0ff':'#ffdca0');
  ctx.drawImage(gc,p.x-34,p.y-34,68,68);

  if(p.invuln>0&&Math.floor(G.time*20)%2){/*blink*/}
}
function drawEnemies(){
  for(const e of G.enemies){
    const base=30*e.scale; const hop=Math.abs(Math.sin(e.bob))*3*e.scale;
    shadow(e.x,e.y+e.r*0.7,e.r*0.9);
    if(e.elite){ctx.globalCompositeOperation='lighter';ctx.globalAlpha=0.45;
      const gc=Assets.glowCanvas(e.tint||'#ff5a6e');ctx.drawImage(gc,e.x-e.r*2,e.y-e.r*2,e.r*4,e.r*4);
      ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';}
    const cv=e.tint?Assets.tinted(e.tile,e.tint,e.ta):Assets._base(e.tile);
    drawSprite(cv,e.x,e.y-hop,base,e.flip,0);
    if(e.flash>0){const wcv=Assets.whiteOf(e.tile);drawSprite(wcv,e.x,e.y-hop,base,e.flip,0,Math.min(1,e.flash*7));}
    if(e.boss)drawBossBar(e);

}
function drawBossBar(e){
  const w=54*e.scale,x=e.x-w/2,y=e.y-e.r*e.scale-14;
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(x-1,y-1,w+2,6);
  ctx.fillStyle='#ff4d5a';ctx.fillRect(x,y,w*clamp(e.hp/e.maxHp,0,1),4);
}
function drawProjectiles(){
  for(const pr of G.projs){
    if(pr.glow){ctx.globalCompositeOperation='lighter';ctx.globalAlpha=0.9;
      const gc=Assets.glowCanvas(pr.color);const s=pr.r*3.4;ctx.drawImage(gc,pr.x-s/2,pr.y-s/2,s,s);
      ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';}
    if(pr.tile){const cv=Assets._base(pr.tile);drawSprite(cv,pr.x,pr.y,20*(pr.scale||1),false,pr.angle||Math.atan2(pr.vy,pr.vx)+Math.PI/2,1);}
    else{ctx.fillStyle=pr.color;ctx.beginPath();ctx.arc(pr.x,pr.y,pr.r*0.7,0,TAU);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(pr.x,pr.y,pr.r*0.3,0,TAU);ctx.fill();}
  }
}
function drawZones(){
  for(const z of G.zones){
    if(!z.live){ // 경고: 펄스 외곽선 + 차오르는 원
      const wp=Math.min(1,z.t/z.warn);
      ctx.globalAlpha=0.12+wp*0.10;ctx.fillStyle=z.color;
      ctx.beginPath();ctx.arc(z.x,z.y,z.r,0,TAU);ctx.fill();
      ctx.globalAlpha=0.5+Math.sin(G.time*11)*0.2;ctx.lineWidth=2/CAM.scale;ctx.strokeStyle=z.color;
      ctx.beginPath();ctx.arc(z.x,z.y,z.r,0,TAU);ctx.stroke();
      ctx.globalAlpha=0.85;ctx.beginPath();ctx.arc(z.x,z.y,z.r*wp,0,TAU);ctx.stroke();
      ctx.globalAlpha=1;
    } else { // 활성 장판
      ctx.globalCompositeOperation='lighter';ctx.globalAlpha=0.12+0.06*Math.sin(G.time*6+z.x);
      ctx.drawImage(Assets.glowCanvas(z.color),z.x-z.r,z.y-z.r,z.r*2,z.r*2);
      ctx.globalCompositeOperation='source-over';
      ctx.globalAlpha=0.20;ctx.fillStyle=z.color;ctx.beginPath();ctx.arc(z.x,z.y,z.r,0,TAU);ctx.fill();
      ctx.globalAlpha=0.5;ctx.lineWidth=1.5/CAM.scale;ctx.strokeStyle=z.color;
      ctx.beginPath();ctx.arc(z.x,z.y,z.r,0,TAU);ctx.stroke();
      ctx.globalAlpha=1;
    }
  }
  // 보스 돌진 예고선
  for(const e of G.enemies){ if(e.boss&&e.ai&&e.ai.cast>0&&e.ai.mode==='dash'){
    ctx.save();ctx.globalAlpha=0.30+Math.sin(G.time*14)*0.15;
    ctx.strokeStyle='#ff5a5a';ctx.lineWidth=e.r*1.7;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(e.x,e.y);ctx.lineTo(e.x+e.ai.tx*(e.ai.dashLen+40),e.y+e.ai.ty*(e.ai.dashLen+40));ctx.stroke();
    ctx.restore(); }}
}
function drawEProjs(){
  for(const pr of G.eprojs){
    if(pr.delay>0)continue;
    if(pr.kind==='ring'){ // gap이 뚫린 충격파 링
      const a0=pr.gapA+pr.gapW/2, a1=pr.gapA-pr.gapW/2+TAU;
      ctx.globalAlpha=0.35;ctx.lineWidth=pr.band*1.7;ctx.strokeStyle=pr.color;
      ctx.beginPath();ctx.arc(pr.x,pr.y,pr.r,a0,a1);ctx.stroke();
      ctx.globalAlpha=0.95;ctx.lineWidth=2.5/CAM.scale;
      ctx.beginPath();ctx.arc(pr.x,pr.y,pr.r,a0,a1);ctx.stroke();
      ctx.globalAlpha=1;continue; }
    ctx.globalCompositeOperation='lighter';ctx.globalAlpha=0.8;
    const s=pr.r*4.2;ctx.drawImage(Assets.glowCanvas(pr.color),pr.x-s/2,pr.y-s/2,s,s);
    ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
    if(pr.tile){const cv=Assets.tinted(pr.tile,pr.color,0.3);drawSprite(cv,pr.x,pr.y,pr.r*2.6,false,pr.angle,1);}
    else{ctx.fillStyle=pr.color;ctx.beginPath();ctx.arc(pr.x,pr.y,pr.r*0.8,0,TAU);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(pr.x,pr.y,pr.r*0.35,0,TAU);ctx.fill();}
  }
}
function drawWeaponAuras(p){
  for(const w of p.weapons){
    if(w.id==='aura'&&w._rad){ctx.globalCompositeOperation='lighter';ctx.globalAlpha=0.16+Math.sin(G.time*3)*0.03;
      const gc=Assets.glowCanvas('#a6ff7a');ctx.drawImage(gc,p.x-w._rad,p.y-w._rad,w._rad*2,w._rad*2);
      ctx.globalAlpha=0.4;ctx.strokeStyle='rgba(166,255,122,0.4)';ctx.lineWidth=2/CAM.scale;
      ctx.beginPath();ctx.arc(p.x,p.y,w._rad,0,TAU);ctx.stroke();
      ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';}
    if(w.id==='spirit'&&w.pets){const tint=w.evo?'#7affc0':'#9dffb0';
      for(const pet of w.pets){ctx.globalCompositeOperation='lighter';ctx.globalAlpha=0.5;
        ctx.drawImage(Assets.glowCanvas(tint),pet.x-15,pet.y-15,30,30);

        drawSprite(Assets.tinted(T.ghostG,tint,0.45),pet.x,pet.y+Math.sin(pet.bob)*2.5,w.evo?26:21,pet.vx<0,0,0.92);}}
    if(w.id==='mine'&&w.mines){for(const mn of w.mines){
      const armed=mn.arm<=0;const bl=armed?0.5+Math.sin(mn.blink)*0.35:0.2;

      shadow(mn.x,mn.y+4,7);
